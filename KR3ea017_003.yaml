body:
  text: 卷下咳嗽論第二十一論曰咳謂無痰而有聲肺氣傷而不清也嗽是無聲而有痰脾濕動而為痰也咳嗽謂有痰而有聲蓋因傷於肺氣動於脾濕咳而為嗽也脾濕者秋傷於濕積於脾也故內經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清若反動之氣必上衝而為咳甚則動於脾濕發而為痰焉是知脾無留濕雖傷肺氣而不為痰也有痰寒少而熱多故咳嗽者非專主於肺而為病以肺主皮毛而司於外故風寒先能傷之也內經曰五臟六腑皆能令人咳非獨肺也各以其時主之而受病焉非其時各傳而與之也所病不等寒暑燥濕風火六氣皆令人咳唯濕病痰飲入胃留之而不行止入於肺則為咳嗽假令濕在於心經謂之熱痰濕在肝經謂之風痰濕在肺經謂之氣痰濕在腎經謂之寒痰所治不同宜隨證而治之若咳而無痰者以辛甘潤其肺故咳嗽者治痰為先治痰者下氣為上是以南星半夏勝其痰而咳嗽自愈枳殼陳皮利其氣而痰飲自除痰而能食者大承氣湯微下之少利為度痰而不能食者厚朴湯治之夏月嗽而發熱者謂之熱痰嗽小柴胡四兩加石膏一兩知母半兩用之冬月嗽而發寒熱謂之寒嗽小青龍加杏仁服之然此為大例更當隨證隨時加減之量其虛實此治法之大體也蜜煎生薑湯蜜煎橘皮湯燒生薑胡桃此三者皆治無痰而嗽者當辛甘潤其肺故也如但用青陳皮藥皆當去白本草云陳皮味辛理上氣去痰氣滯塞青皮味苦理下氣二味俱用散三焦之氣也故聖濟云陳皮去痰穰不除即生痰麻黃髮汗節不去而止汗治風痰熱咳嗽其脈弦面青四肢滿悶便溺祕澀心多躁怒水煮金花丸南星半夏各二兩生用天麻五錢雄黃二錢白麵三兩寒水石一兩燒存性上為細末滴水為丸每服五七十丸至百丸煎漿水沸下藥煮令浮為度漉出淡漿水浸另用生薑湯下或通聖加半夏及局方中川芎丸防風丸皆可用也小黃丸治熱痰咳嗽脈洪面赤煩熱心痛唇口乾燥多喜笑宜小黃丸南星湯洗半夏洗各一兩黃芩一兩半上為細末生薑汁浸蒸餅為丸桐子大每服五十丸至七十丸食後薑湯下及小柴胡湯中加半夏亦可白朮丸治痰濕咳嗽脈緩面黃肢體沉重嗜臥不收腹脹而食不消化宜白朮丸南星半夏俱湯洗各一兩白朮一兩半上為細末糊為丸桐子大每服五七十丸生薑湯下及局方中防己丸亦可用玉粉丸治氣痰咳嗽脈澀面白上喘氣促灑淅惡寒愁不樂宜服之南星半夏俱洗各一兩官桂去皮一兩上為細末薄糊為丸如桐子大每服五七十丸生薑湯下食後及局方中防己丸亦可玉粉丸加減在後心下痞者加枳實五錢身熱甚者加黃連五錢體重者加茯苓一兩氣上逆者加苦葶藶五錢氣促者加人參桔梗各五錢浮腫者加郁李仁杏仁各五錢大便祕者加大黃五錢雙玉散治痰熱而喘痰湧如泉寒水石石膏各等分上為細末煎人參湯調下三錢食後服治痰千緡湯半夏生末一兩大皂角去皮子半兩銼上同於絹袋中盛之用水三升生薑七大片同煎至一半以手操洗之取清汁分作三服食後並服二服效防風丸治痰嗽胸中氣不清利者枳朮丸亦妙防風半兩枳殼半兩去穰麩炒白朮一兩上細末燒餅為丸每服五七十丸生薑湯下天麻丸天麻二兩半夏南星各一兩雄黃少許上以白麵二兩滴水為丸如桐子大每服五十丸至百丸煎淡水令沸下藥煮十餘沸漉出食前生薑湯下利膈丸主胸中不利痰嗽喘促利脾胃壅滯調藏祕瀉推陳致新消進飲食治利膈氣之勝藥也木香一錢半檳榔一錢半人參三錢當歸二錢藿香一錢半大黃酒浸焙一兩厚朴薑製三兩枳實一兩炒甘草三錢炙上為細末滴水和丸如桐子大每服三五十丸食後諸飲皆可下款氣丸治久嗽痰喘肺氣浮腫青皮去白陳皮去白檳榔木香杏仁去皮尖郁李仁去皮茯苓澤瀉當歸廣朮炮馬兜鈴苦葶藶以上各三兩人參防己各五錢牽牛取頭末一兩上為細末生薑汁麵糊為丸如桐子大每服一二十丸加至五七十丸生薑湯下食後服玉粉丸治痰結咽喉不利語音不出半夏洗五錢草烏一字炒桂一字上同為末生薑汁浸蒸餅為丸如雞頭大每服一丸至夜含化多歲不愈者亦效枳殼湯治久痰胸膈不利者多上焦發熱枳殼麩炒去穰三兩桔梗三兩黃芩一兩半上同銼每日早用二兩半水三盞煎至二盞勻作三服午時一服申時一服臨臥時一服三日七兩半藥盡服生半夏湯生半夏湯半夏不以多少洗七遍切作片子上每服稱三錢水一盞半入生薑五大片同煎至一盞和滓食後服一日三二服服三日畢再服枳朮丸盡其痰為度論曰先消胸中氣後去膈上痰再服枳朮丸謂首尾合盡消其氣令痰不復作也清鎮丸治熱嗽小柴胡湯內加人參一倍青黛半兩上為細末麵糊丸如桐子大每服五十丸生薑湯下半夏丸治因傷風而痰作喘逆兀兀欲吐噁心欲倒已吐加檳榔三錢半夏一兩湯洗切雄黃研三錢上同為末生薑汁浸蒸餅為丸桐子大每服三十丸生薑湯下小兒丸如黍米大白朮散治夏暑大熱或醉飲冷痰濕不止膈不利白朮茯苓半夏洗黃芩各等分上為粗末每服五錢至七錢水二盞入生薑十片煎至一盞去滓調陳皮末一錢神麯末一錢食後服法曰大熱大飲蓋酒味熱而引飲冷冷與熱凝於胸中不散而成濕故痰作矣甚者宜吐之吐後服五苓甘露勝濕去痰之劑白朮湯治痰潮上如湧泉久不可治者白朮白茯苓半夏等分上為末每服半兩病大者一兩水二盞生薑七片煎至一盞取清調神麯末二錢頓服之病甚者下玉壺丸一百丸大效永除根天門冬丸治婦人喘手足煩熱骨蒸寢汗口乾引飲面目浮腫天門冬十兩去心稱麥門冬去心八兩生地黃三斤取汁為膏子上二味為末膏子和丸如梧子大每服五十丸煎逍遙散送逍遙散中去甘草加人參或服王氏博濟方中人參荊芥散亦可如面腫不已經曰面腫曰風故宜汗麻黃桂枝可發其汗後服柴胡飲子去大黃故論曰治臟者治其俞治腑者治其合浮腫者治其經治俞者治其土也治合者亦治其土也如兵家圍魏救趙之法也虛損論第二十二論曰虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛損自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰陰虛則陽盛故損自下而上治之宜以苦酸鹹過於脾則不可治也自上而損者一損於肺皮聚而毛落二損損於心血脈虛少不能榮於臟腑婦人月水不通三損損於胃飲食不為肌膚自下而損者一損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克論曰心肺損而色蔽腎肝損而形痿谷不能化而脾損感此病者皆損之病也漸漬之深皆虛勞之疾也四君子湯治肺損而皮聚毛落益氣可也白朮人參黃耆茯苓各等分上為粗末每服五六錢七錢水一盞煎至七分去滓食遠溫服八物湯治心肺虛損皮聚而毛落血脈虛損婦人月水愆期宜益氣和血白朮人參黃耆茯苓川芎熟地黃當歸芍藥各等分上粗末服五七錢水一盞煎至七分去滓食後溫服十全散治心肺損及胃飲食不為肌膚宜益氣和血調飲食白朮人參黃耆茯神桂枝熟地黃當歸川芎芍藥甘草等分上為末加生薑棗同煎水一大盞藥五錢煎至七分食前日三服金剛丸治腎損骨痿不能起於床宜益精萆薢杜仲炒去絲蓯蓉酒浸菟絲子酒浸等分上為細末酒煮豬腰子為丸每服五七十丸空心酒下牛膝丸治腎肝損骨痿不能起於床筋緩不能收持宜益精緩中牛膝酒浸萆薢杜仲炒去絲蓯蓉酒浸防風菟絲子酒浸白蒺藜各等分桂枝減半上細末酒煮豬腰子搗丸桐子大空心酒下五七十丸煨腎丸治腎肝損及脾損穀不化宜益精緩中消穀牛膝酒浸萆薢杜仲蓯蓉菟絲子防風白蒺藜胡蘆巴破故紙等分桂半之上和劑服餌如金剛丸法腰痛不起者甚效黑地黃丸加五味子名腎氣丸治陽盛陰虛脾腎不足房室虛損形瘦無力面多青黃而無常色宜此藥養血益腎蒼朮一斤米泔浸熟地黃一斤川薑冬一兩夏五錢春七錢五味子半斤上為細末棗肉為丸如梧子大每服一百丸至二百丸食前米飲下或酒治血虛久痔甚效經曰腎苦燥急食辛以潤之開腠理致津液通氣五味子味酸故酸以收之此雖陽盛不燥熱乃是五臟虛損於內故可益血收氣也此藥類象神品藥也治陽虛陰盛心肺不足宜八味丸若形體瘦弱無力多困未知陰陽先損夏月地黃丸春秋宜腎氣丸冬月宜八味丸消渴論第二十三論曰消渴之疾三焦受病也有上消中消腎消上消者上焦受病又謂之膈消病也多飲水而少食大便如常或小便清利知其燥在上焦也治宜流濕潤燥中消者胃也渴而飲食多小便黃經曰熱能消穀知熱在中法云宜下之至不欲飲食則愈腎消者病在下焦初發為膏淋下如膏油之狀至病成而面色黧黑形瘦而耳焦小便濁而有脂治法宜養血以肅清分其清濁而自愈也法曰燥上而渴用辛甘潤肺故可用蜜煎生薑湯大器頓之時時呷之法云心肺之病莫厭頻而少飲內經云補上治上宜以緩又曰辛以潤之開腠致津液通則肺氣下流故氣下火降而燥衰矣其渴乃止又經曰二陽結為消王注曰二陽結於胃及大腸俱熱也腸胃藏熱則善消水穀可甘辛降火之劑黃連末一斤生地黃自然汁白蓮花藕自然汁牛乳汁各一斤熬成膏子劑黃連末為丸如梧桐子大每服三十丸少呷溫水送下日進十服渴病立止治上焦膈消而不欲多食小便清利宜小柴胡湯或加白虎湯或錢氏方中地骨皮散內加芍藥黃耆石膏黃芩桔梗之類是也人參石膏湯治膈消上焦煩渴不欲多食人參半兩石膏一兩二錢知母七錢甘草四錢上為粗末每服五錢至七錢水煎食後溫服順氣散治消中熱在胃而能食小便赤黃微利之為效不可多利服此藥漸漸利之不欲多食則愈厚朴薑製一兩大黃四兩枳實二錢炒上銼每服五錢水煎食遠服茴香散治腎消病下焦初證小便如膏油茴香炒苦楝炒上細末酒調二錢食前服八味丸治腎消大病加減法本方內倍加山藥外桂附從四時加減假令方內桂附一兩春各用三錢夏用一錢秋用五錢冬全用一兩珍珠粉丸治白淫夢泄遺精及滑出而不收黃柏一斤於新瓦上燒令通赤為度真蛤粉一斤上為細末滴水丸如桐子大每服一百丸空心酒下法曰盛陽乘陽故精泄也黃柏降火蛤粉咸而補腎陰也又治思想無窮所願不得之證竹籠散治消渴五靈脂黑豆去皮臍上等分為細末每服三錢冬瓜湯調下無冬瓜苗葉皆可日二服小渴二三服效渴定不可服熱藥唯服八味丸去附子加五味子腫脹論第二十四小兒附靈樞脹論云帝問岐伯脹形何如岐伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引少腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六腑脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息又水脹篇云帝問岐伯水脹何如答曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也帝曰膚脹何如岐伯曰膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如答曰腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也腸覃何如答曰寒氣客於腸外與衛氣相搏氣不得營因有所繫癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離藏按之則堅推之則移月事以時下此其候也石瘕何如答曰石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下帝曰膚脹鼓脹可刺邪曰先瀉其脹之血絡後調其經刺去其血絡也經云平治權衡去宛陳莝開鬼門潔淨府平治權衡者察脈之浮沉也去宛陳莝者疏滌腸胃也開鬼門潔淨府者發汗利小便也又鼓脹之病治以雞屎醴名醫云其腫有短氣不得臥為心水兩脅痛為肝水大便鴨溏為肺水四肢皆腫為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水各隨其經絡分其內外審其脈證而別之又有風水皮水石水黃汗歸各臟以論之風合歸肝皮合歸肺黃汗歸脾石合歸腎風水脈浮必惡風皮水脈亦浮按下沒指石水脈沉腹滿不喘黃汗脈沉遲發熱而多涎久而不愈必致癰膿水腫脈浮帶數即是虛寒潛止其間久必沉伏沉伏則陽虛陰實為水必矣要知水脈必沉是也論曰脈出者死與病不相應也諸唇黑則傷肝缺盆盈平則傷心臍出則傷脾足平則傷腎背平則傷肺此五者必不可療也治法云腰以上宜發汗腰以下利小便錢氏論虛實腹脹實則不因吐瀉久病之後亦不因下利脹而喘急悶亂更有痰有熱及有宿食不化而脹者宜服大黃丸白餅子紫霜丸下之更詳認大小便如俱不通先利小便後利大便虛則久病吐瀉後其脈微細肺主目胞腮虛腫手足冷當先服塌氣丸後服異功散及和中丸益黃散溫其氣因於氣腫者橘皮煎丸因於濕為腫煎防己黃耆湯調五苓散因於熱為腫者服八正散又一法燥熱於肺為腫者乃絶水之源也當清肺除燥水自生矣於豉梔湯中加黃芩如熱在下焦陰消使氣不得化者當益陰則陽氣自化也黃柏黃連是也五脈論五水灸法青水灸肝井赤水灸心滎黃水灸脾俞白水灸肺經黑水灸腎合婦人蠱脹無脈燒青丸五皮散亦是論諸蠱脹者有二腫若從胃則旦食而不能夜食旦則不脹夜則脹是也若水腫證濡泄者是也內經曰蠱脹之病治以雞屎醴酒調服水脹之病當開鬼門潔淨府也白茯苓湯名變水白茯苓澤瀉各二兩郁李仁二錢上㕮咀作一服水一碗煎至一半常服無時從少至多服或煎得澄入生薑自然汁在內和麵或作粥飯作常食五七日後覺脹下再以白朮散白朮澤瀉各半兩上為細末每服三錢煎茯苓湯調下或丸亦可服三十丸末治之藥服黃耆芍藥建中之類以調養之平復後忌房室豬魚鹽面等物治水氣蠱脹潔淨府楮實子丸楮實子一斗水二斗熬成膏子白丁香一兩半茯苓三兩去皮上二味為細末用楮實膏為丸如桐子大不計丸數從少至多服至小便清利及腹脹減為度後服中治藥末治藥調養藥疏啓其中忌甘苦酸補其下五補七宣取穴法治腫治其經治金火也井滎俞經陰經金也金水木火陽經火也治腫木香散木香大戟白牽牛各等分上為細末每用三錢豬腰子一對批開摻藥在內燒熟空心服之如左則塌左右則塌右如水腫不能全去於腹上塗甘遂末在繞臍滿腹少飲甘草水其腫便去也治水腫螻蛄去頭尾與葡萄心同研露七日曝乾為細末淡酒調下暑月濕用尤佳又方棗一斗鍋內入水上有四指用大戟並根苗蓋之遍盆合之煮熟為度去大戟不用旋煮旋吃無時盡棗決愈神效眼目論第二十五論曰眼之為病在腑則為表當除風散熱在臟則為里宜養血安神暴發者為表而易治久病者在裡而難愈除風散熱者瀉青丸主之養血安神者定志丸婦人熟乾地黃丸是也或有體肥氣盛風熱上行目昏澀者槐子散主之此由胸中氣濁上行也重則為痰厥亦能損目常使胸中氣清無此病也又有因目疾服藥多而損氣者久之眼漸昏弱乍明乍暗不欲視物此目少血之驗也熟乾地黃丸消風散定志丸相須而養之或有視物不明見黑花者此謂之腎氣弱也宜補腎水駐景丸是也或有暴失明者謂眼居諸陽交之會也而陰反閉之此風邪內滿當有不測之疾也翳膜者風熱重而有之或斑入眼此肝氣盛而發在表也翳膜已生在表明矣當發散而去之反疏利則邪氣內搐為翳則深也邪氣未定謂之熱翳而浮邪氣已定謂之冰翳而沉邪氣牢而深者謂之陷翳當以焮發之物使其邪氣再動翳膜乃浮輔之退翳之藥則能自去也病久者不能速效當以歲月除之治眼赤暴發腫散熱飲子防風羌活黃芩黃連各一兩上銼每服半兩水二盞煎至一盞食後溫服如大便祕澀加大黃一兩如痛甚者加當歸地黃如煩躁不能眠睡加梔子一兩川芎散治風熱上衝頭目眩熱腫及胸中不利川芎槐子各一兩上細末三錢如胸中氣滯不利生薑湯調目疾茶調風熱上攻㕮咀一兩水煎食後服治眼久病昏澀因發而久不愈地黃湯防風羌活黃芩黃連地黃當歸人參茯神各等分上為粗末每服五七錢水一盞半煎至一盞去滓溫服食後槐子散槐子黃芩木賊蒼朮各等分上細末茶清調下食後治眼生翳膜及斑入眼焮赤已過者瀉青丸主之當半減大黃如大便祕焮氣未定依方服之治冰翳久不去者羚羊角散主之羚羊角升麻細辛各等分甘草半之上為細末一半為散一半蜜為丸如桐子大每服五七十丸以羚羊角散下之食後臨臥米泔水煎服治太陽經衛虛血貫腫人臉重頭中濕淫膚脈睛痛肝風盛眼黑腎虛桔梗丸桔梗一斤牽牛頭末三兩上二味為末煉蜜為丸如桐子大每服四五十丸加至百丸食前溫水下日二服金絲膏點眼藥生薑四兩取汁白沙蜜一斤煉去滓猔豬膽汁三錢黃連四兩槌用水一斗浸煎取五升上先煎黃連水後入薑汁次入蜜同煎去沫淨次入下項藥末腦子四錢麝香三錢硇砂四錢硼砂三錢輕粉五錢熊膽四錢青鹽三錢上極細攪勻熬令稀膏點用治眼暴赤發嗔痛不可忍者救苦丸黃連一兩當歸二錢甘草一錢上同銼細新水半碗浸一宿以慢火熬約至一半以綿濾去滓以淨為妙用火再熬作稠膏子為度攤在碗上倒合以物蓋之用熟艾一大彈子許底下燃之用艾熏膏子艾盡為度再入下項藥硃砂一錢飛腦子半錢乳香沒藥等分上同研極細入黃連膏內搜和丸如米大每用二丸點眼大角內仰面臥藥化則起治眼發赤腫毒氣侵睛脹痛宣毒散盆硝雄黃乳香沒藥各等分上為極細末以少許鼻內㗜之治眼風毒發腫鼻中欲嚏嚏多大損而生瘡宣風散川芎甘菊各二錢乳香沒藥各一錢上和勻再研極細少許鼻內㗜之能遠視不能近視局方中定志丸白茯苓去皮人參去蘆頭各三兩遠志去苗及心菖蒲各二兩目能近視不能遠視萬壽地芝丸生薑四兩焙天門冬四兩去心枳殼三兩去穰炒甘菊二兩上為細末煉蜜丸如桐子大茶清或溫酒下一百丸食後此藥能愈大風熱洗眼藥訶子二兩黃丹四兩蜜八兩柳枝四十寸上以河水二碗熬至半碗用一錢熱水化洗之石器內熬治眼赤瞎以青埿蛆不以多少淘淨曬乾末之令害眼人仰臥合目用藥一錢散在眼上須臾藥行待少時去藥赤瞎亦無治倒睫無名異末之摻在紙中卷作捻子點著到藥處吹殺以煙燻目睫自起瘡瘍論第二十六論曰瘡瘍者火之屬須分內外以治其本內經曰膏粱之變足生大丁其原在裡發於表也受持如虛言內結而發諸外未知從何道而出皆是從虛而出也假令太陽經虛從背而出少陽經虛從鬢出陽明經虛從髭而出督脈經虛從腦而出又經曰地之濕氣感則害人皮膚筋脈其在外盛則內行若其脈沉實當先疏其內以絶其原也其脈浮大當先托裡恐氣傷於內也有內外之中者邪氣至甚遏絶經絡故發癰腫經曰榮氣不從逆於肉理乃生癰疽此因失托裡及失疏通又失和榮衛也治瘡之大要須明托裡疏通行榮衛三法托裡者治其外之內疏通者治其內之外行榮衛者治其中也內之外者其脈沉實發熱煩躁外無焮赤痛其邪氣深於內也故先疏通以絶其原外之內者其脈浮數焮腫在外形證外顯恐邪氣極而內行故先托裡內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和榮衛也用此三法之後雖未瘥必無變證亦可使邪氣峻減而易痊愈故經曰諸痛癢瘡瘍皆屬心火又曰知其要者一言而終不知其要流散無窮針灸法曰凡瘡瘍可灸刺者須分經絡部分血氣多少俞穴遠近若從背而出當從太陽五穴隨證選用或刺或灸泄其邪氣凡太陽多血少氣至陰通谷束骨崑崙委中從鬢而出者當從少陽五穴選用少陽少血多氣竅陰俠溪臨泣陽輔陽陵泉從髭而出者當從陽明五穴選用陽明多血多氣厲兌內庭陷谷衝陽解溪從腦而出者初覺腦痛不可忍且欲生瘡也腦者髓之海當灸刺絶骨以泄邪氣髓者舍也故脈浮者從太陽經依前選用脈長者從陽明經依前選用脈弦者從少陽經依前選用論曰諸經各有井滎俞經合井主心下滿及瘡色青滎主身熱及瘡赤色俞主體重節痛瘡黃色經主咳嗽寒熱瘡白色合主氣逆而泄瘡黑色隨經病而有此證者或宜灸宜針以泄邪氣經曰邪氣內蓄則腫熱宜砭射之也內經曰夫癖氣之息者宜以針開除之氣勝血聚者宜石而泄之王注曰石砭也可以破大癰出膿今以排針代之凡瘡瘍已覺微漫腫硬皮血不變色脈沉不痛者當外灸之引邪氣出而方止如已有膿水者不可灸當刺之淺者亦不灸經曰陷者灸之如外微覺木硬而不痛者當急灸之是邪氣深陷也淺者不可灸慎之諸病瘡瘍如嘔者是濕氣浸於胃也藥中宜倍加白朮服之內疏黃連湯治嘔噦心逆發熱而煩脈沉而實腫硬木悶而皮肉不變色根深大病在內臟腑祕澀當急疏利之黃連芍藥當歸檳榔木香黃芩山梔子薄荷桔梗甘草以上各一兩連翹二兩上除檳榔木香二味為細末外並銼每服一兩水一盞半煎至一盞先吃一二服次每服加大黃一錢再服加二錢以利為度如有熱證止服黃連湯大便祕澀加大黃覺無熱證少煎沒藥內托復煎散時時服之如實無熱及大小便通止服復煎散稍有熱證卻服黃連湯祕則加大黃如此內外皆通榮衛和調則經絡自不遏絶矣治腫焮於外根槃不深形證在表其脈多浮痛在皮肉邪氣盛則必侵於內急須內托以救其里也服內托復煎散地骨皮黃耆芍藥黃芩白朮茯苓人參柳桂味淡者甘草防己當歸以上各一兩防風二兩上㕮咀先煎蒼朮一斤用水五升煎至三升去朮滓入前藥十二味再煎至三四盞絞取清汁作三四服終日服之又煎蒼朮滓為湯去滓再依前煎服十二味滓此除濕散鬱熱使胃氣和平如或未已再作半料服之若大便祕及煩熱少服黃連湯如微利及煩熱已過卻服復煎散半料如此使榮衛俱行邪氣不能內侵也治諸瘡瘍臟腑已行如痛不可忍者可服當歸黃耆湯並加減在後當歸黃耆地黃地骨皮川芎芍藥等分上㕮咀每服一兩水一碗煎至五分去滓溫服如發熱者加黃芩煩熱不能臥者加梔子如嘔是濕氣侵胃也倍加白朮膏藥方好芝麻油半斤當歸半兩杏仁四十九個去皮桃柳枝各四十九條長四指上用桃柳二大枝新綿一葉包藥繫於一枝上內油中外一枝攪於鐵器內煎成入黃丹三兩一處熬水中滴成不散如珠子為度冶金絲瘡一云紅絲瘤其狀如線或如繩巨細不等經所謂丹毒是也但比熛毒不甚廣闊人患此疾頭手有之下行至心則死下有之上行亦然法當於瘡頭截經而剌之以出血後嚼萍草根塗之立愈治從高墜下涎潮昏冒此驚恐得也苦杖散苦杖不以多少上細末熱酒調下如産後瘀血不散或聚血皆治之治疔瘡奪命散烏頭尖附子底蠍梢雄黃各一錢蜈蚣一對硇砂粉霜輕粉麝香乳香各半錢信二錢半腦子少許上為細末先破瘡出惡血畢以草杖頭用紙帶入於內以深為妙治瘡難消不能作膿痛不止木香散地骨皮一兩去土皮木香半兩穿山甲二錢半炙黃麝香一字上為細末酒調下三錢及小兒斑後生癰米飲調下效如神治疔瘡毒氣入腹昏悶不食紫花地丁蟬殼管仲各半兩丁香乳香各一錢上細末每服二錢溫酒調下治惡瘡有死肉者及追膿白丁香輕粉粉霜雄黃麝香各一錢巴豆三個去油上同研細新飯和作錠子用之治諸瘡大疼痛不辨肉色漫腫光色名曰附骨癰如神三生散露蜂房蛇退皮頭髮洗淨等分三味燒灰存性研細酒調三錢治膀胱移熱於小腸上為口糜好飲酒人多有此疾當用導赤散五苓散各半兩煎服治少陰口瘡半夏散若聲絶不出者是風寒遏絶陽氣不伸也半夏一兩制桂一字草烏頭一字上同煎一盞水分作二服其效如神治太陰口瘡甘礬散生甘草一寸白礬一栗子大上含化咽津治赤口瘡乳香散乳香沒藥各一錢白礬飛半錢銅緑少許為細末摻用諸瘡瘍痛色變紫黑者回瘡金銀花湯金銀花連枝二兩黃耆四兩甘草一兩上三味銼細酒一升入瓶內閉口重湯內煮三二時取出去滓放溫服之諸瘡腫已破未破焮腫甚當歸散主之當歸黃耆栝蔞木香黃連各等上為粗末煎一兩如痛而大便祕加大黃三錢乳香散治瘡口痛大者寒水石燒一兩滑石一兩乳香沒藥各五分腦子少許上各研細同和勻少摻瘡口上雄黃散治諸瘡有惡肉不能去者雄黃一錢研巴豆一個去皮研上二味同研如泥入乳香沒藥少許再研細少上惡肉自去也木香散治瘡口久不斂木香檳榔各一錢黃連二錢上為細末摻上如痛加當歸一錢貼之自收斂又方蜀椒去目炒黑色一錢另研定粉一兩風化灰五錢白礬二錢半飛過乳香沒藥各一錢上為細末摻瘡口上針頭歲治瘡瘍焮腫木硬蟾酥麝香各一錢各同研極細以兒乳沖調和泥入磁合內盛幹不妨每用以唾津調撥少許於腫處更以膏藥敷之毒氣自出不能為瘡雖有瘡亦輕治白口瘡沒藥散沒藥乳香雄黃各一錢輕粉半錢巴豆霜少許上細末乾摻瘰癧論第二十七夫瘰癧者經所謂結核是也或在耳前後連及頤頷下連缺盆皆為瘰癧或在胸及胸之側下連兩脅皆為馬刀手足少陽主之此經多氣少血故多堅而少軟膿白而稀如泔水狀治者求水清可也如瘰癧生在別經臨時於銅人內隨其所屬經絡部分對證之穴灸之並依經內藥用之獨形而小者為結核續數連結者為瘰癧形表如蛤者為馬刀治馬刀連翹湯連翹二斤瞿麥一斤大黃三兩甘草一兩上㕮咀一兩水兩碗煎至一盞半早食後巳時服在項兩邊是屬少陽經服藥十餘日後可於臨泣穴灸二七壯服藥不可住了至六十日決效有一方加大黃不用甘草更加貝母五兩雄黃七分檳榔半兩同未熱水調下三五錢治瘰癧文武膏桑椹也文武實二斗黑熟者上以布袋取汁銀石器中熬成薄膏白湯點一匙日三服痔疾論第二十八論曰手陽明大腸名曰害蜚蜚蟲也六元正紀論陽明又曰司殺府手陽明屬金大腸名害蜚謂金能害五蟲又曰司殺府謂金主殺既有此二名何以自生蟲蓋謂三焦相火盛而能制陽明金故木來相侮內經曰侮謂勝己也木主生五蟲叔和云氣主生於脾臟旁大腸疼痛陳難當漸覺稍瀉三焦熱莫漫多方立紀綱此言飲酒多食熱物脾生大熱而助三焦氣盛火能生土也當瀉三焦火熱退使金得氣而反制木木受制則五蟲不生病自愈矣蒼朮澤瀉丸蒼朮四兩去皮澤瀉二兩枳實二兩地榆一兩皂子二兩燒存性上為細末燒飯為丸桐子大每服三十丸食前酒或米飲下又方川烏炮古石灰等分依前丸服淋洗藥天仙子荊芥蜀椒蔓荊子等分上以水煎洗黑地黃丸治痔之聖藥也在虛損門下有方婦人胎産論第二十九帶下附論曰婦人童幼天癸未行之間皆屬少陰天癸既行皆從厥陰論之天癸已絶乃屬太陰經也治胎産之病從厥陰經者是祖生化之源也厥明與少陽相為表裡故治法無犯胃氣及上二焦為三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則榮衛自和榮衛和而寒熱止矣外則和於榮衛內則調於清便先將此法為之初治次後詳而論之見證消息同壞證傷寒為之緩治或小便不利或大便祕結或積熱於腸胃之間或以成瘻或散血氣而為浮腫蓋産理多門故同傷寒壞證如發渴用白虎氣弱則黃耆血刺痛而用以當歸腹中痛而加之芍藥以上例證不犯三禁皆産後之久病也凡産後暴病禁犯不可拘也如産後熱入血室者桃仁承氣抵當湯之類是也胃堅燥者大承氣不可以泄藥言之産後世人多用烏金四物是不知四時之寒熱不明血氣之虛與實盲然一概用藥如此而愈加增劇是醫人誤之耳大抵産病天行從增損柴胡雜證從加添四物然春夏雖從柴胡秋冬約同四物藥性寒熱病證虛實不可不察也四物湯常病服餌四時各有增損今具增損於後春倍川芎一曰春二曰脈弦三曰頭痛夏倍芍藥一曰夏二曰脈洪三曰泄秋倍地黃一曰秋二曰脈澀三曰血虛冬倍當歸一曰冬二曰脈沉三曰寒而不食此常服順四時之氣而有對證不愈者謂失其輔也春防風四物加防風倍川芎夏黃芩四物加黃芩倍芍藥秋天門冬四物加天門冬倍地黃冬桂枝四物加桂枝倍當歸此四時常服隨證用之也如血虛而腹痛微汗而惡風四物加朮桂謂之腹痛六合如風虛眩暈加秦艽羌活謂之風六合如氣虛弱起則無力匡然而倒加厚朴陳皮謂之氣六合如發熱而煩不能安臥者加黃連梔子謂之熱六合如虛寒脈微氣難布息不渴清便自調加乾薑附子謂之寒六合如中濕身沉重無力身涼微汗加白朮茯苓謂之濕六合此婦人常病及産後病通用之藥也治婦人虛勞局方中謂之首尾六合者如大聖散下熟乾地黃丸是治無熱虛勞專其養也中道藥也牡丹煎丸空心食前人參荊芥散臨臥食後是治有熱虛勞藥也治婦人懷胎腹脹枳殼湯枳殼三兩炒黃芩一兩上為粗末每服半兩水一盞半煎一盞去滓溫服治産前脹滿身體沉重枳殼湯中加白朮一兩治産前寒熱小柴胡湯中去半夏謂之黃龍湯治懷孕胎漏二黃散生地黃熟地黃各等分上為細末加白朮枳殼湯調下一兩日二服治有孕胎痛地黃當歸湯當歸一兩熟地黃二兩上為粗末作一服水三升煎至升半去滓頓服束胎丸白朮枳殼去穰炒等分上為末燒飯為丸如桐子大每月一日食前服三五十丸溫熟水下胎瘦易生也服至産則已産間藥治胎衣不下或子死腹中或血衝上昏悶或血暴下及胞干而不能産者宜服半夏湯半夏曲一兩半桂七錢半去皮大黃五錢桃仁三十個去皮尖炒上為細末先服四物湯三兩服次服半夏湯三錢生薑三片水一盞煎去三分食後如未效次服下胎丸下胎丸半夏生白斂各半兩上為細末滴水為丸如桐子大食後用半夏湯下三二丸續續加至五七丸如有未效者須廣大其藥榆白皮散主之又不效大聖散主之有宿熱人宜服人參荊芥散産後藥治産後經水適斷感於異證手足牽搐咬牙昏冒宜增損柴胡湯柴胡八錢黃芩四錢半人參三錢半夏三錢石膏四錢知母二錢黃耆五錢甘草四錢炙上為粗末每服半兩生薑五片棗四個水一盞半煎至一盞溫服清無時前證已去次服秦艽湯去其風邪秦艽八錢人參三錢防風四錢半芍藥半兩柴胡八錢黃芩四錢半半夏三錢甘草四錢炙上為粗末每服五七錢水一盞煎至七分溫服清無時二三日經水復行前證退宜服荊芥散小柴胡小料中加荊芥穗五錢枳殼五錢麩炒去穰同小柴胡湯煎服三二日後宜正脾胃之氣兼除風邪宜服防風湯蒼朮四兩防風三兩當歸一兩半羌活一兩半上為粗末每服一二兩水三盞煎至一盞半取清續續常服無時凡胎前之藥無犯胎氣産後變化並同傷寒壞證盡從加減四物湯調治治産後腹大堅滿喘不能臥白聖散樟柳根三兩大戟二兩半甘遂一兩炒上為極細末每服二三錢熱湯調下取大便宣利為度此藥主水氣之勝藥也治産後風氣在表面目四肢浮腫宜加減局方中七聖丸每服二十丸白湯下日加三四丸以利為度如浮腫喘嗽加木香檳榔倍之謂氣多浮則腫如頭目昏冒加羌活川芎謂多風也如只浮腫依七聖丸本方服之治産後日久虛勞雖日久而脈浮疾者宜服三元湯柴胡八錢黃芩人參半夏洗甘草炙以上各三錢川芎芍藥熟地黃當歸各二錢半上為粗末同小柴胡湯煎服治日久虛勞微有寒熱脈沉而浮宜柴胡四物湯川芎熟地黃當歸芍藥各一兩半柴胡八錢人參黃芩甘草半夏曲以上各三錢上為粗末同四物煎服如日久虛勞針灸小藥俱不效者宜服三分散白朮茯苓黃耆川芎芍藥熟地黃當歸各一兩柴胡一兩六錢黃芩六錢人參一兩六錢半夏六錢甘草六錢上為粗末每服一兩水一盞煎至半盞溫服清日一服治産後虛勞不能食宜十全散白朮茯苓黃耆各二兩人參川芎芍藥熟地黃當歸各一兩桂一兩半甘草一兩半炙上銼如麻豆每服半兩水一盞半入生薑五片棗三枚同煎至七分空心食前溫服清凡虛損病者淺深治有次第虛損論中詳論之治産後諸風痿攣無力血風湯秦艽羌活防風白芷川芎芍藥當歸地黃白朮茯苓各等分上為細末一半煉蜜丸如桐子大一半散溫酒調下丸子五七十丸甚妙治産後諸積不可攻當養陰去熱其病自退宜服芍藥湯芍藥一斤黃芩茯苓各六兩上三味為粗末每服半兩水煎日三服去滓溫服治産後兒枕大痛黑白散烏金石燒紅醋淬七遍另為細末寒水石燒存性末上二味各等分另頓放臨服各抄末一錢半粥飲湯下痛止便不可服未止再服大效治産後不煩而渴桃花散新石灰一兩黃丹半錢上細末渴時冷漿水調一錢服治産後沖脹胸中有物狀是噎氣不降紫金丹代赭石𥓌礪石各等分上為細末醋糊為丸如桐子大每服三五十丸酒下胸中痛加當歸湯下久服治血癖又方代赭石一兩桃仁三錢炒去皮尖大黃五錢上為末薄荷水為糊丸如桐子大每服三五十丸溫水下無時治臍腹痛不可忍四物湯一兩加玄胡三錢半治血癖腹痛及血刺腰痛四物湯細末二兩加酒煮玄胡細末三兩每服三錢酒調下治血運血結血聚於胸中或偏於少腹或連於肋脅四物湯四兩倍當歸川芎加鬼箭紅花玄胡各一兩同為末如四物湯煎服取清調沒藥散服之沒藥散虻蟲一錢去足羽炒水蛭一錢炒麝香一錢沒藥三錢上為細末煎前藥調服血下痛止只服前藥治産後頭痛血虛痰癖寒厥皆令頭痛加減四物湯羌活川芎防風香附子炒白芷以上各一兩石膏二兩半細辛二錢當歸五錢熟地黃一兩甘草五錢蒼朮一兩六錢去皮上為粗末每服一兩水煎服無時如有汗者是氣弱頭痛也方中加芍藥三兩桂一兩半加生薑煎如痰癖頭疼加半夏三兩茯苓一兩半加生薑煎如熱厥頭痛又加白芷三兩石膏三兩知母一兩半寒厥頭痛加天麻三兩附子一兩半生薑煎治産後風虛血眩精神昏昧荊芥散荊芥穗一兩三錢桃仁五錢去皮尖炒上為細末溫水調服三錢微喘加杏仁去皮尖炒甘草炒各三錢治産前證胎不動如重物下墜腹冷如冰立效散川芎當歸各等分上為粗末每服稱三錢水二盞煎至一盞去滓食前服治如人胎漏及因事下血枳殼湯枳殼半兩黃芩半兩白朮一兩上為粗末每服五七錢水一盞煎至七分食前空心服治婦人筋骨痛及頭痛脈弦憎寒如瘧宜服風六合湯四物湯四兩加羌活防風各一兩治婦人血氣上衝心腹肋下悶宜服治氣六合湯四物四兩加木香檳榔各半兩治婦人臍下冷腹痛腰脊痛宜服玄胡六合湯四物內加玄胡苦楝炒各一兩治婦人氣充經脈月事頻並臍下痛宜芍藥六合湯四物內倍加芍藥治婦人經事欲行臍腹絞痛宜服八物湯四物內加玄胡苦楝各一兩檳榔木香各半兩治婦人經水過多別無餘證四物內加黃芩白朮各一兩治婦人經水澀少四物內加葵花煎治婦人虛勞氣弱喘嗽胸滿宜氣六合湯四物內加厚朴一兩制枳實半兩炒以上煎法並同四物服之四物主治法熟地黃補血如臍下痛非熟地黃不能除此通腎經之藥也川芎治風瀉肝木如血虛頭痛非芎不能除去此通肝經之藥也芍藥和血理脾治腹痛非芍藥不能除此通脾經之藥也當歸和血如血刺痛非當歸不能除此通心經之藥也以上四味治法如前一證於四物湯中各加二味用之如少腹痛四物湯四兩加玄胡苦楝各一兩經水暴多四物四兩加黃連黃芩各一兩如腹痛者只加黃連如夏月用不去黃芩經水如黑豆水加黃連黃芩各一兩如經水少而血色和者四物四兩加熟地黃當歸各一兩如經水適來適斷往來寒熱者先服小柴胡以去其寒熱後以四物湯調治之如寒熱不退勿服四物是謂變證表邪猶存不能效也依前論中變證隨證用藥調治之治婦人血積增損四物湯四物內加廣朮京三稜桂乾漆皆依法制各加一兩如四物煎服治婦人産後血昏血崩月事不調遠年乾血氣皆治之名曰紅花散乾荷葉牡丹皮當歸紅花蒲黃炒上各等分為細末每服半兩酒煎和滓溫服如衣不下另末榆白皮煎湯調半兩立效治婦人惡物不下當歸炒芫花炒上細末酒調三錢又好墨醋碎末之小便酒調下妙又治胎衣不下蛇退皮炒焦細末二錢酒調下諸見血無寒衄血下血吐血溺血皆屬於熱但血家證皆宜服此藥生地黃散生地黃熟地黃枸杞子地骨皮天門冬黃耆芍藥甘草黃芩上各等分同銼每服一兩水一盞半煎至一盞去滓溫服脈微身涼惡風每一兩加桂半錢吐血者多有此證治衄血不止麥門冬飲子麥門冬生地黃上等分銼每服一兩煎服又衄血先硃砂蛤粉次木香黃連大便結下之大黃芒硝甘草生地黃溏軟梔子黃芩黃連可選用帶下附論曰赤者熱入小腸白者熱入大腸原其本也皆濕熱結於脈故津液湧溢是為赤白帶下本不病緣五脈經虛結熱屈滯於帶故女子臍下㾓痛而綿綿陰器中時下也故經曰任脈為病男子內結七疝女子帶下瘕聚王注曰任脈自胞上過帶脈貫於臍上故男子內結七疝女子帶下帶脈起於季脅章門如束帶狀今濕熱冤結不散故為病也經曰脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱所以為帶下冤屈也冤結也屈滯而病熱不散先以十棗湯下之後服苦楝丸大玄胡散調下之熱去濕除病自愈也如女子不月先瀉心火血自下也內經曰二陽之病發心脾有不得隱曲故女子不月其傳為風消王注曰大腸胃發病也心脾受之心主血心病則血不流脾主味脾病則味不化味不化則精不足精血不足故其證不能已虧則風邪勝而真氣愈消也又經曰月事不來者胞脈閉也胞脈屬於心而絡於胞中今氣上迫心氣不得下通故月事不來先服降心火之劑後服局方中五補丸後以衛生湯治脾養血氣也苦楝丸治婦人赤白帶下苦楝碎酒浸茴香炒當歸上等分為細末酒糊丸如桐子大每服三五十丸空心酒下腰腿痛疼四物四兩加羌活防風各一兩衛生湯當歸白芍藥各三兩黃耆三兩甘草一兩上為粗末每服半兩水二盞煎至一盞去滓溫服空心如虛者加人參一兩大頭論第三十雷頭風附夫大頭病者是陽明邪熱太甚資實少陽相火而為之也多在少陽或在陽明或傳太陽視其腫勢在何部分隨經取之濕熱為腫木盛為痛此邪見於頭多在兩耳前後先出皆主其病也治之大不宜藥速速則過其病所謂上熱未除中寒復生必傷人命此病是自外而之內者是血病況頭部分受邪見於無形跡之部當先緩而後急先緩者謂邪氣在上著無形之分部既著無形無所不至若用重劑速下過其病難已雖用緩藥若急服之或食前或頓服皆失緩體則藥不能除病當徐徐浸漬無形之邪也或藥性味形體擬象皆要不離緩體是也且後急者謂緩劑已瀉邪氣入於中是到陰部染於有形質之所若不速去則損陰也此終治卻為客邪當急去之是治客以急也且治主當緩者謂陽邪在上陰邪在下各本家病也若急治之不能解紛而益亂也此故治主當緩治客以急者謂陽分受陰邪陰分受陽邪此客氣急除去之也假令少陽陽明為病少陽為邪出於耳之前後也陽明為邪者首大腫是也先以黃芩黃連甘草湯通炒過銼煎少少不住服或劑畢再用大黃煨鼠黏子新瓦上炒香煎藥成去滓內芒硝俱各等分亦時時呷之無令飲食在前得微利及邪氣已只服前藥如不已再同前次第服之取大便利邪氣即止如陽明渴者加石膏如少陽渴者加栝蔞根陽明行經升麻芍藥葛根甘草太陽行經羌活防風之類雷頭風附夫治雷頭者諸藥不效為與證不相對也夫頭者震卦主之震仰盂故豫製藥內加荷葉謂象其震之形其色又青乃述類象形也當煎局方中升麻湯升麻一兩蒼朮一兩荷葉一個全者上為細末每服五錢水一盞煎七分溫服食後或燒全荷葉一個研細調煎藥服亦妙耳論附論曰耳者蓋非一也以竅言之是水也以聲言之金也以經言之手足少陽俱會其中也有從內不能聽者主也有從外不能入者經也有若蟬鳴者有若鐘聲者有若火熇熇狀者各隨經見之其間虛實不可不察也假令耳聾者腎也何謂治肺肺主聲鼻塞者肺也何謂治心心主臭如推此法皆從受氣為始腎受氣於巳心受氣於亥肝受氣於申肺受氣於寅脾王四季此法皆長生之道也小兒斑疹論第三十一論曰斑疹之病其狀各異瘡發焮腫於外屬少陽三焦相火謂之斑小紅靨行於皮膚之中不出者屬少陰君火也謂之疹凡顯斑證者若自吐瀉者慎勿治則多吉謂邪氣上下皆出也大凡瘡疹首尾皆不可下恐妄動而生變此謂少陽通表宜和之也當先安其里以解毒次微發之安里解毒者謂能安和五臟防風湯是也如大便不祕次微發之微發之藥錢氏方中甚多宜選用之如大便過祕宜微利之當歸丸棗變百祥丸是也初知是斑疹若便發之令斑並出小兒難禁是使別生他證也首尾不可下者首曰上焦尾曰下焦若已吐利不可下也便宜安里藥三五服如能食大便祕者內實宜微疏利之若內虛而利者宜安里藥三五服末後一服調微發之藥服之大抵用安里之藥多發表之藥少祕則微疏之邪氣不並出能作番次使小兒易禁也身溫者順身涼者逆則宜服防風湯以和之防風湯防風一兩地骨皮黃耆芍藥枳殼荊芥穗牛蒡子以上各半兩上為細末溫水調下或為粗末煎服二三錢更妙治大便祕而內實能食宜當歸丸當歸五錢黃連二錢半大黃二錢甘草一錢炙先將當歸熬作膏子入藥三味為丸漸次服十丸妙治斑疹大便祕結棗變百祥丸大戟去骨一兩棗三個去核上二味用水一碗煎至水盡為度去大戟不用將棗焙乾可和劑旋丸從少至多以利為度五臟病各有所見證熱則從心寒則從腎嗽而氣上則從肺風從肝瀉從脾假令瀉見嗽而氣上脾肺病也瀉白益黃散合而服之又宜黃芩厚朴湯白朮厚朴湯謂脾苦濕肺苦燥氣則上逆也其證先瀉又兼面色黃腸鳴呦呦者是也如見渴熱多者當服厚朴湯不渴熱少者當服白朮厚朴湯其他五勝若有兼證皆如此類然更詳後說四時經移用藥假令春分前風寒也宜用地黃羌活防風或地黃丸及瀉青丸相間服之春分後風熱也宜用羌活防風黃芩或瀉青丸用導赤散下之立夏之後熱也用三黃丸導赤散夏至後濕熱也宜導赤瀉黃散合而服之或黃芩甘草白朮茯苓之類為勝濕之藥立秋後宜用益黃散瀉白散陳皮厚朴人參木香之類秋分後用瀉白散立冬之後地黃丸主之謂腎不受瀉也大凡小兒斑疹已發有瘡有聲音者乃形病氣不病也無瘡無聲音者乃氣病形不病也有瘡而無聲音者是形氣俱病也後一證當清利肺氣八風湯或涼膈散大黃芒硝亦可或如聖湯加大黃或八味羌活湯加大黃此是春時發斑謂之曰風斑耳瘡疹者內經云痛癢瘡瘍皆屬心火斑子者是相君行命三焦真陽氣之所作也若氣入肺變膿胞入肝為水胞自病為斑心乃君火入於皮作癮疹為肺主皮毛心不害肺金此乃君之德也未瘡而發搐乃外感寒邪內發心熱而發搐用茶湯下解毒丸或犀角地黃湯主之已發便稠密形勢如針頭者當輕發其表涼其內連翹升麻湯主之若斑已發稠密甚而微喘飲水有熱證當以去風藥微下之若出不快清便自調知為在表不在裡當微發之升麻葛根湯主之若有乾黑陷身不大熱大小便澀則知熱在內當煎大黃湯下宣風散身表大熱者表證未罷不可利大便若斑疹已出見小熱小便不利者當利小便已發後有餘毒不散為復有身熱癰瘡之類當用解毒之藥藥略第三十二針法附羌活治支節痛太陽經風藥也防風療風通用甘草和中調諸藥肉桂通氣助陽桂枝閉汗和表麻黃發太陽太陰經汗桃仁滋血破血黃芩瀉肺氣雄黃去風白芷治正陽明頭痛知母泄腎火助陰石膏瀉肺火是陽明大涼藥半夏去痰柴胡治少陽厥陰寒熱往來芍藥止腹痛安太陰人參補氣和中瓜蒂治濕在上頭去中脘痰涎吐藥赤豆利小便杏仁潤肺除嗽蒼朮溫中去濕熱強胃草烏頭熱行經南星治風痰須用天麻治頭風神麯消食強胃白朮蒼朮同功陳皮益氣枳實治心下痞枳殼利胸中氣消痞黃連泄心火白茯苓止渴利小便太陰經藥苦葶藶瀉肺火桔梗治咽喉痛利肺氣大黃泄實熱厚朴治脹滿厚腸黃耆止汗治諸氣虛不足檳榔破氣下行荊芥清利頭目烏梅肉助脾收胃飲食沉香益氣和神肉豆蔻治大腸腸滑附子補命及心火朴硝寒咸去燥梔子除煩利氣行小便當歸補三陰血不足川芎太陽頭痛地黃補腎真陰不足臍下痛萆薢補腎不足杜仲壯筋骨兩全牛膝補筋益脾蓯蓉益陽道及命門火衰沙苑蒺藜補腎水真陰破故紙補命門不足五味子補五臟氣不足巴豆去濕痰藥細辛少陰頭痛不足升麻陽明經和解藥蛇蛻去皮膚風燥茴香利小便補腎去濕寒助陽苦楝子去小腹痛廣朮去積聚乾薑益氣和中生地黃涼血沒藥除血痛和血之勝藥也地榆治下部有血澤瀉治少陰不渴而小便不利及膀胱中有留垢真假形金木水火土深淺色青赤黃白黑急緩性寒熱溫涼平厚薄味辛酸鹹苦甘潤枯體虛實輕重中輕枯虛薄緩淺假宜上厚重實潤深真急宜下其中平者宜中余形色性味皆隨臟腑所宜此處方用藥之大概耳知此者用心則思過半矣流注針法心痛脈沉腎經原穴弦肝經原穴澀肺經原穴浮心經原穴緩脾經原穴腰痛身之前足陽明原穴衝陽身之後足太陽原穴京骨身之側足少陽原穴丘墟針之最要兩脅痛針少陽經丘墟心痛針少陰經太溪湧泉及足厥陰原穴腰痛不可忍針崑崙及刺委中出血太陽喘滿痰實口中如膠針太溪穴噦嘔無度針手厥陰大陵穴頭痛不可忍針足厥陰太陽經原穴熱無度不可止刺陷骨穴出血骨熱不可治前板齒乾燥當灸百會大椎小腸疝痛當刺足厥陰肝經太衝穴血不止鼻衄大小便皆血血崩當刺足太陰井隱白喉閉刺手足少陽井並刺少商及足太陰井大煩熱晝夜不息刺十指間出血謂之八關大刺目疾睛痛欲出亦大刺八關百節疼痛實無所知三稜針刺絶骨出血眼大眥痛刺手太陽井穴少澤小眥痛刺少陽井穴關衝陰頭中痛不可忍者卒疝也婦人陰中痛皆刺足厥陰井大敦穴附素問元氣五行稽考珞琭子云天元一氣定侯伯之遷榮蓋論元氣也許員曰木瘦金方火尖水肥土厚蓋論五行以元氣為根富貴壽夭系之由有尫羸而壽考亦有壯盛而暴亡元氣固藏則尫羸而無害及其散漫則壯盛而愈危是以元氣為根本五行為枝葉夫元氣者兌之位也元始之祖先天地生圓而無隙寂而不動感而遂通虛而生神乾體成焉乾為天天一生水故一水二火三木四金五土五行形焉四方之民均受元氣一也及其生焉各類五行形體殊異是故西北之民金水象金方水肥人方正肥厚東南之人木火象木瘦火尖人多瘦長尖小北人肥南人瘦理宜然也北人賦性沉厚體貌肥上長下短頭骨大腰骨小此本體也若光明磊落見機疾速腰背豐隆者元氣固藏富貴壽考坎中藏真火升真水而為雨露也南人賦性急暴體貌尖瘦下長上短頭骨偏腰骨軟此本體也若寬大度機謀詳緩腦額圓聳元氣固藏富貴壽考離中藏真水降真火而為利氣也又有南人似北人北人似南人不富則貴以此推之要在察元氣觀五行分南北定壽夭則攻守有方調養有法不妄藥人也亦猶有刑曹總其權使執法者不私巡禁者申具禁使出塗者不擾朝廷在於上明賞罰於百官施利氣於萬民故君得以尊無為而治天下和平災害不生君臣和於上百官和於朝萬民和於下庶物和於野馴而行之於萬年計也醫者明方術製法度以療民病養性之藥防其漸也猶巡尉也治病之藥減其毒猶守令也保命之藥濟其弱猶曹憲也延年之藥防其危猶朝廷也良工總其要明虛實於三部調和氣於百骸故心得以寧神得以清則四大和平疾患不生神氣和於上五臟和於中步履和於下脈絡和於體馴而行之不死之道也人之生也自幼而至壯自壯而老血氣盛衰其各不同不可一概治之六歲至十六歲者和氣如春日漸滋長內無思想之患外無愛慕之勞血氣未成不勝寒暑和之違也膚腠疏薄易受感冒和之傷也父母愛之食飲過傷其治之之道節飲食適寒暑宜防微杜漸行巡尉之法用養性之藥以全其真二十歲至五十歲和氣如夏精神鼎盛內有思想之患外有愛慕之勞血氣方剛不畏寒暑和之違也勞傷筋骨冒犯八邪和之傷也以酒為漿醉以入房其治之之道辨八邪分勞佚行守令之法宜治病之藥當減其毒以全其真五十歲至七十歲者和氣如秋精耗血衰血氣凝泣思慮無窮形體傷憊和之違也百骸疏漏風邪易乘和之傷也風雨晦明飲食遲進其治之之道順神養精調腑和臟行憲曹之權施賑濟之法守令內恤巡尉外護宜保命之藥以全其真七十歲至百歲者和氣如冬五臟空洞猶蛻之蟬精神浮蕩筋骨沮弛和之違也觸物易傷衣飲厚薄和之傷也大寒振栗大暑煎燔其治之之道餐精華處奧庭行相傳之道燮理陰陽周流和氣宜延年之藥以全其真夫如是則調御中節治療得宜陰陽協和榮衛流暢凡厥有生同躋壽域矣乎諸吐方法仲景云傷寒三四日邪氣未傳於裡其邪氣在上用瓜蒂散吐而瘥豈可俟其汗又云傷寒六七日胸中微痞不欲言懊憹昏眩無下證仲景用梔子豉湯吐之立可又忽然中風不知人事亦不須汗喉中呷咂之聲用稀涎散吐之亦可又有小兒驚風潮搐手足掣縮用驗命散吐之又云風頭痛經云若不吐涎久則瞽目而不治用瓜蒂散吐之三吐而瘥又暴嗽風涎上壅咽噎不利用茶調散吐之又陽癇久不愈未成癡呆用導涎散吐之又陰癇用二聖散吐之又膏粱之人食物多食生膾胸中不下化蟲伏於胸中胸膈不快噎食不下用藜蘆散吐之又久病患脅痛諸藥莫能治用獨聖散加蠍梢半錢吐之諸癇不時發作不知人事用半生半熟湯吐之暗風病久不瘥發過如故用鬱金散吐之痎瘧久不瘥發寒熱無時用常山散吐之蛟龍瘕痛腹脹如蠱用球糖散吐之人初患傷食或用冷身腹悶亂身熱見食則啘用赤小豆散吐之婦人筋攣骨痛用神應散吐之或曰筋病吐之何為答曰木鬱達之所謂達者令其條達也或又有打撲墜墮先吐之用金花散後下之用承氣湯蓋承者順也偏枯證半身不遂是也用追風散吐之須風后有目疾眼有半明可救之用防風湯吐之小兒上喘潮熱先用蔚金散吐之後用鎮庭散下之立效治顛狂病久不已用三聖散吐之後大下之諸風掉搖強直不知人事便可懸豆膏涎出立效胸膈滿悶背痛或臂痛可先用祛風湯吐之後服烏藥散癘風或瘡瘍惡瘡便用二聖散吐之後服苦參丸諸厥氣厥中風不省人事便用神聖散膏鼻內灌之吐出涎立效破傷風牙關緊急角弓反張便與神聖散吐之後汗之下之效三法俱用之又有人患蛟龍瘕痛久不愈欲死用球糖膏吐之吐出其物形如蜥蜴長七八寸立可吐法者上古高醫用之今庸下之流止看諸方不知治法不識病源即不行聖人之法去聖遠矣可不恐歟治黃腫詩曰白酒煎飛面青礬百草霜依方炮製作消卻幾多黃緑礬四兩五倍子百草霜一兩木香二錢上為細末用酒煎飛面為丸如梧桐子大每服五丸空心酒下二三服又方平胃散四兩青礬二兩醋糊為丸米飲下又方平胃散烏沉湯四兩青礬二兩酒糊為丸又方好川當歸四兩用浮子酒浸七日青礬四兩制煅赤色成珠子為細末百草霜三兩同研細用當歸酒同研細為丸如梧桐子大每服五丸至七丸服後一月黃去立效此方祖傳七世治諸氣腫茯苓散芫花醋拌炒澤瀉郁李仁甜葶藶漢防己藁本各二錢半陳皮去白白茯苓白檳榔瞿麥各半兩滑石大戟各七錢半上為細末每服一錢濃煎雙白皮湯空心調下取下碧緑水如煙羊脂即效如未盡隔日又服腫消不服忌食鹽一百日治癧瘡方爛至胸前兩腋下有塊如茄子大或牽至兩肩上四五年不能痊者並皆治之其驗如神常州府武進縣朱守仁傳其項不能回頭數日減可始看瘡爛破胸前者用荊芥根下段揃碎煎沸待溫洗瘡良久看瘡爛破處紫黑用針刺一一出血再洗三四次上真芝麻油將樟腦雄黃為細末用油調雞翎掃瘡上以出水下次日再洗仍用前藥掃三日又用韭菜地上蚯蚓糞五更早晨收作圓虎口大用炭火上燒煅紅取出淨碾為末每一丸添乳香沒藥輕粉各半錢少些穿山甲九片煅紅色為末合用芝麻油調敷患處其妙如神千金漏蘆湯加雞心檳榔點眼神效紫金膏輕粉雄黃銅青川芎龍腦麝香黃連青鹽海螵蛸當歸硇砂乳香血蠍以上淨五分硃砂硼砂各三錢沒藥一錢爐甘石二兩童便制七次黃丹二兩白丁香二分先將十九味乳制極細無聲白砂蜜一斤先將黃連末熬後下爐甘石黃丹用槐枝攪不住手煎如紫色用瓷器盛用油紙七片封口窖土內去火七日方用神效
