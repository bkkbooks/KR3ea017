front:
  text: 自序夫醫道者以濟世為良以愈疾為善蓋濟世者憑乎術愈疾者仗乎法故法之與術悉出內經之玄機此經固不可力而求智而得也況軒岐問答理非造次奧藏金丹寶典深隱生化玄文為修行之徑路作達道之天梯得其理者用如神聖失其理者似隔水山其法玄妙其功深固非小智所能窺測也若不訪求師範而自生穿鑿者徒勞皓首耳餘二十有五志在內經日夜不輟殆至六旬得遇天人授飲美酒若橡斗許面赤若醉一醒之後目至心靈大有開悟衍其功療左右逢原百發百中今見世醫多賴祖名倚約舊方恥問不學特無更新之法縱聞善說反怒為非嗚呼患者遇此之徒十誤八九豈念人命死而不復者哉仁者鑑之可不痛歟以此觀之是未知陰陽變化之道況木極似金金極似火火極似土土極似木故經曰亢則害承乃制謂己亢極反似勝己之化俗流未知故認似作是以陽為陰失其本意經所謂誅罰無過命曰大惑醫徒執迷反肆旁識縱用獲效終無瞭然之語其道難與語哉僕見如斯首述玄機刊行於世者已有宣明等三書革庸醫之鄙陋正俗論之舛訛宣揚古聖之法則普救後人之生命今將餘三十年間信如心手親用若神遠取諸物近取諸身比物立象直明真理治法方論裁成三卷三十二論目之曰素問病機氣宜保命集此集非崖略之說蓋得軒岐要妙之旨故用之可以濟人命舍之無以活人生得乎心髓祕之篋笥不敢輕以示人非絶仁人之心蓋聖人之法不遇當人未易授爾後之明者當自傳焉時大定丙午閏七月中元日河間劉完素守真述楊威素問病機氣宜保命集序天興末豫北渡寓東原之長清一日過前太醫王慶先家於几案間得一書曰素問病機氣宜保命集試閲之乃劉高尚守真先生之遺書稿也其文則出自內經中托其要而述之者朱塗墨注凡三卷分三十二門門有資次合理契經如原道則本性命之源論脈則盡死生之說攝生則語存神存氣之理陰陽則講抱元守一之妙病機則始終有條有例治病之法盡於此矣本草則驅用有佐有使處方之法盡於此矣至於解傷寒論氣宜說曲盡前聖意讀之使人廓然有醒悟恍然有所發明使六脈十二經五臟六腑三焦四肢目前可得而推見之也後二十三論隨論出證隨證出方先後加減用藥次第悉皆蘊奧精妙入神嘗試用之十十皆中真良醫也雖古人不是過也雖軒岐復生不廢此書也然先生有序序己行藏言幼年已有直格宣明原病式三書雖義精愨猶有不盡聖理處今是書也復出與前三書相為表裡非曰後之醫者龜鏡歟至如平昔不治醫書者得之隨例驗證度已處藥則思亦過半矣豫謂是書雖在農夫工販緇衣黃冠儒宗人人家置一本可也若己有病尋閲病源不至亂投湯劑況醫家者流者哉惜哉先生卒書不世傳使先生之道竊入小人口以為己書者有之豫憫先生道屏翳於茆茨荊棘中故存心精較今數年矣命工鏤版擬廣世傳使先生之道出於茆茨荊棘中亦起世膏肓之一端也歲辛亥正月望日太滷楊威序重刻保命集序粵自軒岐而下數千載間雖有跗緩盧扁之於前其道不行於其後後之學者如盲執炬夜行窮谷其道愈失矣然醫道湮沒已久天固生守真劉通玄於河間素有奇遇得天人之旨而能盡其術乃撰宣明等三書一十七萬余言開導後學年幾六十再遇異人授以玄醞一橡斗許一醉乃醒豁然有悟復撰是書自謂窮理盡性精微至要莫出乎是也蓋醫之所以為醫者必先知其人之所以為人之道人與天地一故體天之道以察四時因地之利以審百病其神聖功巧格物致知之理不在乎藥而在乎醫之何如耳嘗聞鶡冠子曰昔伊尹醫殷呂望醫周奚生醫秦申麃醫郢原季醫晉陶朱醫越夷吾醫齊故魏文侯有曰管子用政行醫術以扁鵲之道桓公其霸乎其說有自矣今是書也其攝生之法與夫修齊之道理無二歧道同一軌大有益於醫道也後之學者誠能推究其理審乎病源體乎天道順乎地理以治其疾將有囿於壽域者也緣是書者金世宗大定二十六年丙午守真所撰之書也時在宋孝宗淳熙十三年焉始守真靳惜無傳至胡元憲宗元年辛亥乃宋理宗淳祐十一年也相去六十五年矣太滷楊政亨謂天下之寶當與天下共之不可私也乃鋟諸梓惜乎古板於兵燹不存久矣世無其傳今命工重刊既完必用序以紀其實姑書於篇端云或曰不書中國之正朔而用金虜之正者何曰當宋季也河間為金虜所有而執用之故也歲在宣德辛亥三月初二日丙寅臞仙朱權書
