body:
  text: 卷上原道論第一經曰觀天之道執天之行盡矣蓋天一而地二北辨而南交入精神之運以行矣擬之於象則水火也畫之於卦則坎離也兩者相須彌滿六合物物得之況於人乎蓋精神生於道者也是以上古真人把握萬象仰觀日月呼吸元氣運氣流精脫骨換形執天機而行六氣分地紀而運五行食乳飲血省約儉育日夜流光獨立守神肌肉若一故能壽敝天地無有終時此其道生之要也夫道者能卻老而全形身安而無疾夫水火用法象也坎離言交變也萬億之書故以水為命以火為性土為人人為主性命者也是以主性命者在乎人去性命者亦在乎人養性命者亦在乎人何則修短壽夭皆自人為故經曰精神內守病安從來又曰務快其心逆於生樂所以然者性命在乎人故人受天地之氣以化生性命也是知形者生之舍也氣者生之元也神者生之制也形以氣充氣耗形病神依氣位氣納神存修真之士法於陰陽和於術數持滿御神專氣抱一以神為車以氣為馬神氣相合可以長生故曰精有主氣有元呼吸元氣合於自然此之謂也智者明乎此理吹噓呼吸吐故納新熊經鳥伸導引按蹺所以調其氣也平氣定息握固凝想神宮內視五臟昭徹所以守其氣也法則天地順理陰陽交媾坎離濟用水火所以交其氣也神水華池含虛鼓漱通行榮衛入於元官溉五臟也服氣於朝閉息於暮陽不欲迭陰不欲復煉陰陽也以至起居適早晏出處協時令忍怒以全陰抑喜以全陽泥丸欲多擲天鼓欲常鳴形欲常鑑津欲常咽體欲常運食欲常少眼者身之鑑也常居欲頻修耳者體之牖也城廓欲頻治面者神之庭也神不欲復發者腦之華也腦不欲減體者精之元也精不欲竭明者身之寶也明不欲耗補瀉六腑淘煉五精可以固形可以全生此皆修真之要也故修真之要者水火欲其相濟土金欲其相養是以全生之術形氣貴乎安安則有倫而不亂精神貴乎保保則有要而不耗故保而養之初不離於形氣精神及其至也可以通神明之出神明之出皆在於心獨不觀心為君主之官得所養則血脈之氣王而不衰生之本無得而搖也神之變無得而測也腎為作強之官得所養則骨髓之氣榮而不枯蟄封藏之本無得而傾也精之處無得而奪也夫一身之間心居而守正腎下而立始精神之居此宮不可太勞亦不可竭故精太勞則竭其屬在腎可以專嗇之也神太用則勞其藏在心靜以養之唯精專然後可以內守故昧者不知於此欲拂自然之理謬為求補之術是以僞勝真以人助天其可得乎原脈論第二大道之渾淪莫知其源然至道無言非立言無以明其理大象無形非立象無以測其奧道象之妙非言不明嘗試原之脈者何也非氣非血動而不息榮行脈中衛行脈外經曰脈者血之府也自素問而下迄至於今經所不載無傳記而莫聞其名焉然而玄機奧妙聖意幽微雖英俊明哲之士非輕易可得而悟也夫脈者果何物乎脈者有三名一曰命之本二曰氣之神三曰形之道經所謂天和者是也至於折一支瞽二目亦不為害生而脈不可須臾失失則絶命害生矣經曰春弦一曰長夏洪一曰鉤秋毛一曰澀冬石一曰沉此言正脈同天真造化之元氣也巡於春夏秋冬木火水金之位生長收藏參和相應故稟二儀而生不離於氣故脈有生死之驗經曰脈者血之府也如世之京都州縣有公府廨署也國因置者所以禁小人為非道也公府不立則善者無以伸其枉惡者無以罰其罪邪正混同賢愚雜處而亂之根也經曰五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也既陰陽為神明之府脈為血之府而明可見焉血之無脈不得循其經絡部分周流於身滂湃奔迫或散或聚氣之無脈不能行其筋骨臟腑上下或暴或蹶故經曰出入廢則神機化滅升降息則氣立孤危故氣化則物生氣變則物易氣盛則物壯氣弱則物衰氣絶則物死氣正則物和氣亂則物病皆隨氣之盛衰而為變化也脈字者從肉從永從爪從血四肢百骸得此真元之氣血肉筋骨爪發榮茂可以倚憑而能生長也長久永固之道故從肉從永者是也從爪從血者巡之如水分流而布遍周身無有不通也釋名曰脈脈幕也如幔幕之遮覆也幕絡一體之形導太一真元之氣也元氣者在氣非寒非熱非暖非涼在脈者非弦非洪非澀非沉不為氣而浮沉不為血而流停乃沖和自然之氣也故春溫夏熱秋涼冬寒所以然者為元氣動而不息巡於四方木火水金之位溫涼寒暑之化生生相續新新不停日月更出四序迭遷脈不為息故人有身形之後五臟既生身中元氣即生焉故春弦夏洪秋毛冬石此四時之氣也而脈者乃在其中矣道經曰視之不見聽之不聞搏之不得迎之不見其首隨之不見其後此如脈之謂也又云埏埴以為器當其無有器之用故有之以為利無之以為用又曰吾不知名字之曰道強為之名曰大斯立脈之名之本意也故道者萬物之奧脈者百骸之靈奧靈之妙其道乃同元氣者無器不有無所不至血因此而行氣因此而生故榮行脈中衛行脈外瞻之在前忽焉在後而不匱者皆由於脈也分而言之曰氣曰血曰脈統而言之惟脈運行血氣而已故經曰血氣者人之神不可不謹養也陰陽別論曰所謂陽者胃脘之陽也此陽者言脈也胃者土也脈乃天真造化之元氣也若土無氣則何以生長收藏若氣無土何以養化萬物是無生滅也以平人之氣常稟於胃正理論曰谷入於胃脈道乃行陰陽交會胃和脈行人稟天地之候故春胃微弦曰平但弦而無胃曰死夏胃微鉤曰平但鉤而無胃曰死長夏微軟曰平但弱而無胃曰死秋胃微毛曰平但毛而無胃曰死冬胃微石曰平但石而無胃曰死陰者真臟也見則為敗敗則必死五臟為陰肝脈至中外急如循刀刃責責然如按琴瑟弦心脈至堅而搏如循薏苡子纍纍然肺脈至大而虛如以毛羽中人膚腎脈至搏而絶如指彈石辟辟然脾脈至弱而乍數乍疏夫如此脈者皆為臟脈獨見而無胃脈五臟皆至懸絶而死故經曰別於陽者知病忌時別於陰者知生死之期故人性候躁急悁促遲緩軟弱長短大小皮堅肉厚各隨其狀而脈應之常以一息四至為準者言呼出心與肺吸入腎與肝五至者胃兼主四旁在呼吸之間也數則為熱遲則為寒如天之春秋二分陰陽兩停晝夜各得五十度自此添一遭則熱減一遭則寒脈之妙道從此可知矣或如散葉或如燃薪或如丸泥或如絲縷或如湧泉或如土頽或如偃刀或如轉索或如游魚假使千變萬化若失常者乃真元之氣離絶五臟六腑不相管轄如喪家之狗元氣散失而命絶矣經曰積陽為天積陰為地陽化氣陰成形此言一氣判而清濁分也元氣者天地之本天和者血氣之根華他云脈者謂血氣之先也孔子曰天不言而四時行焉百物生焉而脈亦如之又經曰自古通天者生之本皆通乎天氣也通天者謂通元氣天真也然形體者假天地之氣而生故奉生之氣通計於天稟受陰陽而為根本天地合氣命之曰人天氣不絶真靈內屬動靜變化悉與天通易云乾坤成列而易立乎其中矣故天地之體得易而後生天地之化得易而後成故陽用事則春生夏長陰用事則秋收冬藏寒往而暑來暑往則寒來始而終之終而復始天地之化也而易也默然於其間而使其四序各因時而成功至於寒不凌暑暑不奪寒無愆陽伏陰之變而不至於大肅大溫故萬物各得其沖氣之和然後不為過而皆中節也道經曰萬物負陰而抱陽沖氣以為和百姓日用而不知斯脈之道也故脈不得獨浮沉獨大小獨盛衰獨陰陽須可沉中有浮浮中有沉大中有小小中有大盛中有衰衰中有盛陰中有陽陽中有陰充塞一身之中盈溢百骸之內無經絡不有無氣血不至養筋骨毛髮堅壯膩澤非心非腎非肝非脾五臟之盛真氣固密不為邪傷若憂愁思慮飢飽勞逸風雨寒暑大驚卒恐真氣耗亂氣血分離為病之本噫夫萬物之中五常皆備審脈之道而何獨無五常之邪夫仁固衛一身充盈五臟四肢百骸皆得榮養無沖和之氣獨真臟脈見則死矣生則不見死則獨見好生惡死此仁之謂也分布軀體和調氣血貴之在頭目耳鼻賤之在跖臀陰篡不得上而有不得下而無無所不施無所不至此義之謂也長人脈長短人脈短肥人脈沉瘦人脈浮大人脈壯小人脈弱若長人短短人長肥人浮瘦人沉大人弱小人壯夫如此者皆不中理而為病此禮之謂也見在寸則上病見在關則中病見在尺則下病五臟有疾各有部分而脈出見不為潛藏伏匿一一得察有餘不足而愈其病此智之謂也春弦夏洪秋毛冬石太陽之至大而長太陰之至其脈沉少陰之至其脈鉤陽明之至短而澀少陽之至大而浮厥陰之至其脈弦四序不失其期六氣為常准者此信之謂也非探頤索隱鉤深致遠學貫天人旁通物理者未能達於此矣攝生論第三論曰內經謂法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也且飲食起居乃人生日用之法縱恣不能知節而欲傳精神服天氣者不亦難乎又經曰飲食自倍腸胃乃傷起居如驚神氣乃浮是以聖人春木旺以膏香助脾夏火旺以膏腥助肺金用事膳膏臊以助肝水用事膳膏膻以助心所謂因其不勝而助之也故食飲之常保其生之要者五穀五果五畜五菜也脾胃待此而倉廩備三焦待此而道路通榮衛待此以清以濁筋骨待此以柔以正故經云蓋五味相濟斯無五宮之傷所以養其形也雖五味為之養形若味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央所謂失五味之常而損其形也王注曰味有偏緣臟有偏絶此之謂也飲食者養其形起居者調其神是以聖人春三月夜臥早起被髮緩形見於發陳之時且曰以使志生夏三月夜臥早起無厭於日見於蕃秀之時且曰使志無怒使氣得泄秋三月早臥早起與雞俱興見於容平之時收斂神氣且曰使志安寧以應秋氣冬三月早臥晚起去寒就溫見於閉藏之時且曰使志若伏若匿若有私意若已有得此順生長收藏之道春夏養陽秋冬養陰順四時起居法所以調其神也經所謂逆於春氣則少陽不生肝氣內變逆於夏氣則太陽不長心氣內涸逆於秋氣則太陰不收肺氣焦滿逆於冬氣則少陰不藏腎氣獨沉此失四時之氣所以傷其神也智者順四時不逆陰陽之道而不失五味損益之理故形與神俱久矣乃盡其天年而去與夫務快其心逆於生樂者何足與語此道哉故聖人行之賢者佩之豈虛語哉陰陽論第四論曰天地者陰陽之本也陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也故陰陽不測謂之神神用無方謂之聖倘不知此謂天自運乎地自處乎豈足以語造化之全功哉大哉乾元萬物資始至哉坤元萬物資生所以天為陽地為陰水為陰火為陽陰陽者男女之血氣水火者陰陽之徵兆惟水火既濟血氣變革然後剛柔有體而形質立焉經所謂天覆地載萬物悉備莫貴乎人人稟天地之氣生四時之法成故人生於地懸命於天人生有形不離陰陽蓋人居天之下地之上氣交之中不明陰陽而望延年未之有也何則蒼天之氣不得無常也氣之不襲是謂非常非常則變矣王注曰且蒼天布氣尚不越於五行人在氣中豈不應於天道左傳曰違天不祥繫辭云一陰一陽之謂道老子曰萬物負陰而抱陽故偏陰偏陽謂之疾夫言一身之中外為陽內為陰氣為陽血為陰背為陽腹為陰腑為陽臟為陰肝心脾肺腎五臟皆為陰胃大腸小腸膀胱三焦六腑皆為陽蓋陽中有陰陰中有陽豈偏枯而為道哉經所謂治心病者必求其本是明陰陽之大體水火之高下盛衰之補瀉遠近之大小陰陽之變通夫如是惟達道人可知也察色論第五論曰聲合五音色合五行聲色符同然後定立臟腑之榮枯若滋榮者其氣生如翠羽雞冠蟹腹豕膏烏羽是也枯夭者其氣敗如草茲衃血枳實枯骨炲煤是也至如青赤見於春赤黃見於夏黃白見於長夏白黑見於秋黑青見於冬是謂五臟之生者以五行之相繼也得肝脈色見青白心脈色見赤黑脾脈色見黃青肺脈色見白赤腎脈色見黑黃是謂真臟之見者以五行之相剋也若乃肺風而眉白心風而口赤肝風而目青脾風而鼻黃腎風而肌黑以風善行數變故爾肝熱而左頰赤肺熱而右頰赤心熱而顏赤脾熱而鼻赤腎熱而頤赤以諸熱皆屬火故爾以至青黑為痛黃白為熱青白為寒以九氣不同故爾鼻青為腹水黑為水氣白為無血黃為胸寒赤為有風鮮明為留飲而五色取決於此故爾然審病者又皆以真脾為本蓋真脾之黃是謂天之氣五色又明病雖久而面黃必生者以其真氣外榮也此數者雖皆成法然自非心清見曉於冥冥不能至於此故五色微診可以目察尤難難經曰望而知之謂之神為見五色於外故決死生也傷寒論第六論曰夫熱病者皆傷寒之類也或愈或死止於六七日間若兩感於寒者必不免於死經所謂人之傷於寒者則為病熱熱雖甚不死蓋傷寒者非雜病所比非仲景孰能明此故張仙公深得玄機之理趣達六經之標本知汗下之淺深若投湯劑正與不正禍福影響何暇數日哉然仲景分三百九十七法一百一十三方其證有六其治有四經云一日巨陽受之其脈尺寸俱浮二日陽明受之其脈尺寸俱長三日少陽受之其脈尺寸俱弦四日太陰受之其脈尺寸俱沉細五日少陰受之其脈尺寸俱微緩六日厥陰受之其脈尺寸俱沉澀其太陽病者標本不同標熱本寒從標則太陽發熱從本則膀胱惡寒若頭項痛腰脊強太陽經病也故宜發汗其陽明病者雖從中氣標陽本實從標則肌熱從本則譫語若身熱目痛鼻乾不得臥陽明經病故宜解肌太陽傳陽明非表裡之傳若譫語從本為實故宜下便王注曰以陽感熱其少陽病者標陽本火從標則發熱從本則惡寒前有陽明後有太陰若胸脅痛而耳聾往來寒熱少陽經病故宜和解其太陰病者標陰本濕從標則身目黃從本則腹脹滿若腹滿而嗌乾太陰經病故宜泄滿下濕從其本治其標少陰病者標陰本熱從標則爪甲青而身冷從本則脈沉實而發渴若口燥舌乾而渴少陰經病故宜溫標下本其厥陰病者故厥陰之中氣宜溫也若煩滿囊縮厥陰經病故為熱宜苦辛下之故經所謂知標知本萬舉萬當不知標本是為妄行又曰各通其臟乃懼汗泄非宜此之謂也故明斯六經之標本乃為治傷寒之規矩此所謂證有六也且如發汗桂枝麻黃之輩在皮者汗而發之葛根升麻之輩因其輕而揚之法也承氣陷胸之輩下者因而竭之法也瀉心十棗之輩中滿泄之法也瓜蒂梔豉者高者因而越之法也故明此四治之輕重可為了傷寒之繩墨此之謂其治有四也若明六經四法豈有發黃生斑蓄血之壞證結胸痞氣之藥過難經所謂未滿三日可汗而已其滿三日可泄而已故仲景曰太陽病脈浮緊無汗身疼痛八九日不解表證仍在當發其汗宜麻黃湯主之少陰病得三二日口燥咽乾者急宜大承氣下之孰敢執於三四日汗泄之定法也是以聖人書不盡言言不盡意說其大概此之謂也經所謂發表不遠熱攻裡不遠寒余自制雙解通聖辛涼之劑不遵仲景法桂枝麻黃髮表之藥非余自衒理在其中矣故此一時彼一時奈五運六氣有所更世態居民有所變天以常火人以常動動則屬陽靜則屬陰內外皆擾故不可峻用辛溫大熱之劑縱獲一效其禍數作豈曉辛涼之劑以蔥白鹽豉大能開發鬱結不惟中病令汗而愈免致辛熱之藥攻表不中其病轉甚發驚狂衄血斑出皆屬熱藥所致故善用藥者須知寒涼之味況兼應三才造化通塞之理也故經所謂不知年之所加氣之盛衰虛實之所起不可以為工矣大抵雜病者氣之常也隨方而異其治不同卒病者氣之異也其治則同其愈則異昔黃帝興四方之問岐伯舉四治之能故傷寒之法備矣哉大矣哉若視深淵如迎浮雲莫知其際是以知發表攻裡之藥性察標本虛實之並傳量老少壯弱之所宜勞逸緩急之稟性切脈明陰陽之分部詳證之邪氣之淺深故可宜會通之法矣內經曰謹熟陰陽無與衆謀此之謂也病機論第七論曰察病機之要理施品味之性用然後明病之本焉故治病不求其本無以去深藏之大患故掉眩收引膹郁腫脹諸痛癢瘡皆根於內夫百病之生也皆生於風寒暑濕燥火以知化之變也經言盛者瀉之虛者補之余錫以方士而方士用之尚未能十全余欲令要道必行桴鼓相應猶拔刺雪汙工巧神聖可得備聞靈樞經曰刺深而猶可拔汙深而猶可雪莊子曰雪猶洗也岐伯曰審察病機無失氣宜此之謂也黃帝曰願聞病機何如岐伯曰諸風掉眩皆屬於肝少慮無怒風勝則動肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼為將軍之官謀慮出焉此為陰中之少陽通於春氣其脈弦王注曰肝有二布葉一小葉如木甲拆之狀故經所謂其用為動乃木之為動火太過之政亦為動蓋火木之主暴速所以掉眩也掉搖也眩昏亂也旋運皆生風故也是以風火皆屬陽陽主動其為病也胃脘當心痛上支兩脅隔咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆裡急緛戾脅痛嘔泄甚則掉眩巔疾兩脅下痛引少腹令人善怒虛則目識䀮䀮無所見耳無所聞善恐如人將捕之凡病肝木風疾者以熱為本以風為標故火本不燔遇風冽乃焰肝本不甚熱因金衰而旺肺金不勝心火木來侮於金故諸病作矣其為治也燥勝風王注曰風自木生燥為金化風余則制之以燥肝勝則治以清涼清涼之氣金之氣也木氣之下金氣承之又曰風淫於內治以辛涼肝欲散急食辛以散之故木主生榮而主春其性溫故風火則反涼而毀折是兼金化制其木也故風病過極而反中外燥澀是反兼金化也故非為金制其木是甚則如此中風偏枯者由心火暴盛而水衰不能制則火實剋金金不能平木則肝木勝而兼於火熱則卒暴僵仆凡治消疸僕擊偏枯痿厥氣滿發肥貴膏粱之疾也故此臟氣平則敷和太過則發生不及則委和諸痛癢瘡皆屬於心靜則神明熱勝則腫心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣其脈鉤其味苦其色赤為君主之官神明出焉此為陽中之太陽也王注曰心形如未敷蓮花中有九空以導引天真之氣神之宇也經所謂其用為燥火性燥動其明於外熱甚火赫鑠石流金火之極變也燔焫山川旋反屋宇火之災眚也故火非同水水智而火愚其性暴速其為病也當胸中熱嗌乾右胠滿皮膚痛寒熱咳喘唾血血泄鼽衄嚏嘔溺色變甚則瘡癢胕腫肩背臑缺盆中痛瘍疹身熱驚惑惡寒戰栗譫妄衄蔑語笑瘡瘍血流狂妄目赤胸中痛脅支滿脅下痛背膺肩甲間痛兩臂內痛虛則胸腹大脅下與腰相引而痛其為治也以寒勝熱王注曰小熱之氣涼以和之大熱之氣寒以取之甚熱之氣汗以發之發之不盡逆制之制之不盡求其屬以衰之又曰用水之主以制陽光經曰氣有多少病有盛衰治有緩急方有大小此之謂也是以熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之心欲軟急食鹹以軟之君火之下陰精承之火氣之下水氣承之是故火主暴虐故燥萬物者莫熯乎火夏月火熱極甚則天氣熏和而萬物反潤以水出液林木津流及體熱極而反汗液出是火極而反兼水化俗以難辨認是作非不治已極反攻王氣是不明標本但隨兼化之虛象妄為其治反助其滿而害於生命多矣故此臟平則升明太過則赫曦不及則伏明王注曰百端之起皆自心生諸濕腫滿皆屬脾土味和氣化濕勝則濡泄脾者倉廩之本營之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃故為倉廩之官又名諫議之官五味出焉此至陰之類通於土氣為陰中至陰脾也其脈緩王注曰脾形象馬蹄內包胃脘象土形也其用為化兼四氣聚散復形群品以主溉灌肝心肺腎不主於時寄旺四季經所謂善不可見惡者可見也其變驟注其災霖潰其為病也胕腫骨痛陰淖按之不得腰脊頭頸痛時眩大便難陰氣不用飲不欲食咳唾則有血積飲痞膈中滿霍亂吐下身重善飢肌肉痿足不收行脅䐜嘔吐泄注下王注曰脾熱則生濕虛則腹滿腸鳴飧泄食不化者有胃之寒者有胃之熱者色白澄徹清冷皆屬於寒色黃水赤渾濁皆屬於熱故仲景曰邪熱不殺穀火性疾速此之謂也其為治也風勝濕濕自土生風為木化土余則制之以風脾盛治之以燥故濕傷肉濕勝則濡泄甚則水閉胕腫王注曰濕為水水盛則腫水下形肉已消又曰濕氣為淫皆為腫滿但除其濕腫滿自衰若濕氣在上以苦吐之濕氣在下以苦瀉之以淡滲之治濕之法不利小便非其治也故濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之若濕上甚而熱治以苦溫佐以甘辛以汗為故而止濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之脾苦濕急食苦以燥之又曰土氣之下木氣承之本草曰燥可去濕桑白皮赤小豆之屬王注曰半身已上濕氣有餘火氣復郁所以明其熱能生濕經所謂風寒在下燥熱在上濕氣在中火遊行其間是亦熱之用矣故土主沉霒雲雨而宏靜雨熱極甚則飄驟散落是反兼風木製其土也若脾熱甚土自雍燥去其濕以寒除熱脾土氣衰以甘緩之所以溏泄積飲痞隔腫滿濕熱乾涸消渴慎不可以溫藥補之故積溫成熱性之溫乃勝氣之藥也故此臟喜新而惡陳常令滋澤無使乾涸土平則備化太過則敦阜不及則卑監諸氣膹郁病痿皆屬於肺金常清氣利燥勝則乾肺者氣之本魄之處也其華在毛其充在皮其味辛其色白而為相傅之官治節出焉為陽中之少陰通於秋氣其脈毛王注曰肺之形象人肩二布葉一小葉中有二千四空行列以分布諸臟清濁之氣經所謂其用為固其變肅殺其眚蒼落其為病也骨節內變左胠脅痛寒清於中感而瘧太涼革候咳腹中鳴注瀉鶩溏咳逆心脅滿引小腹善暴痛不可反側嗌乾面塵色惡腰痛丈夫㿗疝婦人少腹痛浮虛鼽尻陰股髀腨胻是病皴揭實則喘厥逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾其為治也熱勝燥燥自金生熱為火化金余則制之以火肺勝則治之以苦又曰金氣之下火氣承之燥淫於內治以苦溫佐以苦辛以苦下之若肺氣上逆急食苦以泄之王注曰制燥之勝必以苦溫故受干病生焉是以金主於秋而屬陰其氣涼涼極天氣清明而萬物反燥故燥若火是金極而反兼火化也故病血液衰也燥金之化極甚則煩熱氣鬱痿弱而手足無力不能收持也凡有聲之痛應金之氣故此臟平氣則審平大過則堅成不及則從革諸寒收引皆屬於腎水能養動耗寒勝則浮腎者主蟄封藏之本精之處也其華在發其充在骨其味鹹其色黑為作強之官伎巧出焉為陰中之太陰通於冬氣其脈石王注曰腎臟有二形如豇豆相併而曲附於膂筋外有脂裹里白表黑主藏精故仙經曰心為君火腎為相火是言在腎屬火而不屬水也經所謂膻中者臣使之官喜樂出焉故膻中者在乳之間下合於腎是火居水位得升則喜樂出焉雖君相二火之氣論其五行造化之理同為熱也故左腎屬水男子以藏精女子以系胞右腎屬火遊行三焦興衰之道由於此故七節之旁中有小心是言命門相火也經所謂其變凝冽其眚冰雹其為病也寒客心痛腰腿痛大關節不利屈伸不便若厥逆痞堅腹滿寢汗實則腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂王注曰大小腹大小腸也此所謂左腎水發痛也若夫右腎命門相火之為病少氣瘡瘍疥癬癰腫脅滿胸背首面四肢浮腫腹脹嘔逆瘛瘲骨痛節有動注下溫瘧腹中暴痛血溢流注精液目赤心熱甚則瞀昧暴痛瞀悶懊憹嚏嘔瘡瘍驚燥喉痹耳鳴嘔湧暴注瞤瘛暴死瘤氣結核丹熛皆相火熱之勝也其為治也寒勝熱燥勝寒若熱淫於內治以鹹寒火淫所勝平以鹹冷故相火之下水氣承之如寒淫於內治以甘熱佐以苦辛寒淫所勝平以辛熱又曰腎苦燥急食辛以潤之腎欲堅急食苦以堅之故水本寒寒急則水冰如地而能載物水發而雹雪是水寒亢極反似剋水之土化是謂兼化也所謂寒病極者反腎滿也左腎不足濟之以水右腎不足濟之以火故此髒水平則靜順不及則涸流太過則流衍諸厥固泄皆屬於下厥謂氣逆固謂禁固氣逆則肝腎失守失守則不能禁固出入無度燥濕不恆故氣下則愈也經所謂厥氣上行滿脈去形諸痿喘嘔皆屬於上肺者臟之長也為心之華蓋故肺熱葉焦發為痿躄是氣鬱不利病喘息而嘔也嘔謂嘔酸水火氣炎上之象也胃膈熱甚則為嘔也若衰火之炎痿躄則愈利肺之氣喘息自調也道路開通吐嘔則除凡病嘔湧溢食皆屬之火也王注曰內格嘔逆食不得入是有火也經所謂三陽有餘則為痿易王注曰易有變常用自痿弱無力也故此者熱之明矣諸熱瞀瘛皆屬於火熱氣勝則濁亂昏昧也瞀視乃昏也經所謂病筋脈相引而急名曰瘛者故俗謂之搐是也熱勝風搏並於經絡故風主動而不寧風火相乘是以熱瞀瘛而生矣治法祛風滌熱之劑折其火勢熱瘛可立愈若妄加灼火或飲以發表之藥則取死不旋踵諸禁鼓栗如喪神守皆屬於火禁栗驚惑如喪神守悸動怔忪皆熱之內作故治當以制火制其神守血榮而愈也諸痙項強皆屬於濕寒濕同性水火同居故足太陽膀胱經屬水而位下所以濕可傷也其脈起目內眥上額交於巔上其支別從巔入絡於腦還出別下項故主項強太陽表中風加之以濕客於經中內挾寒濕則筋脈抽急故痙項強而不柔和也此太陽寒濕當詳有汗無汗治以流濕祛風緩發表而愈也諸逆衝上皆屬於火沖攻也氣炎上故作嘔湧溢食不下也諸脹腹大皆屬於熱肺主於氣貴乎通暢若熱甚則鬱於內故肺脹而腹大是以火主長而高茂形現彰顯升明舒榮皆腫之象也熱去則見白利也諸躁狂越皆屬於火胃實則四肢實而能登高也故四肢者諸陽之本經所謂陰不勝陽則脈流薄疾病乃狂是以陽盛則使人妄言罵詈不避親疏神明之亂也故上善若水下愚若火此之謂也治之以補陰瀉陽奪其食則病已諸暴強直皆屬於風暴虐而害也強徑有力而不能和柔也乃厥陰風木勢甚而成此王注曰陽鬱於內而陰行於外千金曰強直為風治以瀉火補金木能自平也諸病有聲鼓之如鼓皆屬於熱腹脹大而鼓之有聲如鼓者熱氣甚則然也經所謂熱勝則腫此之類也是以熱氣內郁不散而聚所以叩之如鼓也諸腹脹大皆為里證何以明之仲景曰少陰病腹脹不大便者急下之宜大承氣湯所謂土堅勝水則干急與大承氣湯下之以救腎水故知無寒其熱明矣諸病胕腫疼酸驚駭皆屬於火胕腫熱勝內則陽氣滯故也疼酸由火實制金不能平木則木王而為酸酸者肝之味也故經所謂二陽一陰發病主驚駭王注曰肝主驚然肝主之原其本也自心火甚則善驚所以驚則心動而不寧也故火衰水平治之本也諸轉反戾水液渾濁皆屬於熱熱氣燥爍於筋故筋轉而痛應風屬於肝也甚則吐不止暍熱之氣加之以泄濕勝也若三氣雜乃為霍亂故仲景曰嘔吐而利名為霍亂故有乾霍亂有濕霍亂得其吐利邪氣得出名濕霍亂也十存八九若不得吐利揮霍撩亂邪無由出名曰乾霍亂十無一生二者皆以冒暑中熱飲食不節寒熱氣不調清濁相干陰陽乖隔則為此病若妄言寒者大誤矣故熱則小便渾而不清寒則潔而不濁故井水煎湯沸則自然渾濁也諸病水液澄徹清冷皆屬於寒水液為病寒也故水清淨其氣寒冷水穀不化而吐利其色白而腥穢傳化失常食已不飢雖有邪熱不殺穀而不飢者無倦而常好動其便色黃而酸王注曰寒者上下所出即吐出溺出也又法曰小寒之氣溫以和之諸嘔吐酸暴注下迫皆屬於熱流而不腐動而不蠹故吐嘔吐酸者胃膈熱甚則鬱滯於氣物不化而為酸也酸者肝木之味或言吐酸為寒者誤也暴注者是注泄也乃腸胃熱而傳化失常經所謂清氣在下則生飧泄下迫者後重裡急窘迫急痛也火性急速而能造物故也俗云虛坐弩責而痛也諸澀枯涸乾徑皴揭皆屬於燥澀枯者水液氣衰少血不榮於皮肉氣不通利故皮膚皴揭而澀也及甚則麻痹不仁涸乾者水少火多繫辭云燥萬物者莫熯乎火故火極熱甚水液干而不潤於身皮膚乃啓裂手足有如斧傷而深三二分者冬月甚而夏月衰故法曰寒能收斂收斂則燥澀皴揭熱能縱緩縱緩則滋榮潤澤皆屬燥金之化也王注曰物之生滑利物之死枯澀其為治也宜開通道路養陰退陽涼藥調之榮血通流麻木不仁澀涸乾徑皴揭皆得其所慎毋服烏附之藥經所謂金木水火土運行之數寒暑燥濕火風臨御之化不失其道則民病可調凡受諸病者皆歸於五行六氣勝復盛衰之道矣王注曰人生有形不能無患既有其患亦常有逃生化出陰陽者也故曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令得調達而致和平此之謂也氣宜論第八論曰治病必明六化分治五味五色所主五臟所宜五行之運行數六氣之臨御化然後明陰陽三才之數故數之可數者人中之陰陽也然所合數之可得者也夫陰陽者數之可十推之可百數之可千推之可萬故天地陰陽者不以數推以象之謂也經曰丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氐昂畢玄天之氣經於張翼婁胃所謂戊己分者奎壁角軫則天地之門戶也是以將前三數與天象俱明始終之六氣所司之高下在泉淺深之勝復左右之間同與不同三紀太過不及之理故可分天地之化産民病之氣宜矣經所謂太陽司天之政故歲宜苦以燥之溫之陽明司天之政故宜以辛苦汗之清之散之又宜以咸少陽司天之政故歲宜以咸宜辛宜酸滲之泄之漬之發之觀氣寒溫以調其過太陰司天之政故宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流少陰司天之政故歲宜咸以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之厥陰司天之政故歲宜辛以調上以咸調下必折其鬱氣先資其化源是以迎而奪之王氣之法也故云六氣有餘用熱遠熱用溫遠溫用寒遠寒用涼遠涼食宜同法此其道也故王注曰夏寒甚則可以熱犯熱寒不甚則不可犯也若有表證若有里證故法云發表不遠熱攻裡不遠寒不發不攻而犯寒犯熱使寒熱內賊其病益甚故無者生之有者甚之所以不遠熱則熱至不遠寒則寒至其寒至則堅痞腹痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀眛昏郁注下瞤瘛腫脹吐嘔鼽血衄血頭痛骨節變肉痛血溢血泄淋閉之病生矣王注曰食已不肌吐利腥穢亦寒之疾也暴喑冒眛目不認人躁擾狂越譫語罵詈驚癇亦熱之病也故經所謂無失天信無逆氣宜無翼其勝無贊其復是謂至也倘不知斯寒熱內賊失氣之宜因不知四時五行因加相勝釋邪攻正絶人長命術不通經為粗工之戒是以六氣上司九宮中司九元下司九宣三數俱明各分主客勝復淫治克伐主病歲物氣味之厚薄故經所謂氣味有厚薄性用有躁靜治保有多少力化有淺深故少陽在泉寒毒不生太陽在泉熱毒不生故其氣專其味正少陰在泉寒毒不生太陰在泉燥毒不生此所謂天化地産故天地氣合六節分而萬物化生矣經所謂謹候氣宜無失病機病機者寒暑燥濕風金木水火土萬病悉自此而生矣故謹察病機之本得治之要者乃能愈疾亦常有不明六氣五行之所宜氣味厚薄之所用人身為病之所由而能必獲其效者鮮矣哉本草論第九論曰流變在乎病主治在乎物制用在乎人三者並明則可以語七方十劑宣通補瀉輕重澀滑燥濕是十劑也大小緩急奇偶復是七方也是以制方之體欲成七方十劑之用者必本於氣味生成而成方焉其寒熱溫涼四氣者生乎天酸苦辛鹹甘淡六味者成乎地氣味生成而陰陽造化之機存焉是以一物之中氣味兼有一藥之內理性不無故有形者為之味無形者謂之氣若有形以無形之治喘急昏迷乃生無形以有形之治開腸洞泄乃起經所謂陰味出下竅陽氣出上竅王注曰味有質故下流於便瀉之竅氣無形故上出於呼吸之門故陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味王注曰氣化則精生味和則形長是以有生之大形精為本故地産養形形不足者溫之以氣天産養精精不足者補之以味形精交養充實不虧雖有苛疾弗能為害故溫之以氣者是溫之以肺補之以味者是補之以腎是以人為萬物之靈備萬物之養飲和食德以化津液以淫筋脈以行榮衛故經所謂陰之所生本在五味氣味合而服之以補精益氣所以為全生之術故五穀五畜五菜五果甘苦酸辛鹹此為補養之要也何則谷入於口而聚於胃胃為水穀之海喜谷而惡藥藥之所入不若穀氣之先達故治病之法必以穀氣為先是以聖人論真邪之氣者謂汗生於穀不歸於藥石辨死生之候者謂安穀則生過期不惟數於五臟先明胃氣為本以此知五味能養形也雖毒藥攻邪如國之用兵蓋出於不得已也是以聖人發表不遠熱攻裡不遠寒辛甘發散為陽酸苦湧泄為陰故辛散酸收甘緩苦堅咸耎隨五臟之病證施藥性之品味然後分奇偶大小緩急之制也故奇偶者七方四制之法四制者大小緩急也所謂氣有多少病有盛衰治有緩急方有大小故大小者君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也又曰奇方云君一臣二君二臣三偶方云君二臣四君二臣六所以七方者四制之法奇偶四制何以明之假令小承氣調胃承氣為奇之小方也大承氣抵當湯為奇之大方也所謂因其攻下而為之用者如此桂枝麻黃為偶之小方葛根青龍為偶之大方所為因其發而用之者如此經所謂近者奇之遠者偶之身之表者為遠身之裡者為近汗者不以奇下者不以偶不以者不用也故補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄故味厚者為陰薄為陰之陽為味不純粹者也故味所厚則泄之以下味所薄則通氣者也王注曰味厚則泄薄則通氣厚者為陽薄為陽之陰故附子乾薑味甘溫大熱為純陽之藥為氣厚者也丁香木香味辛溫平薄為陽之陰氣不純粹者也故氣所厚則發熱氣所薄則發泄經曰氣薄則發泄厚則發熱王注曰陰氣潤下故味薄則發泄陽氣炎上故氣厚則發熱味薄為陰少故通泄氣薄為陽少故汗出是以論氣味之薄厚合奇偶之大小故腎肝位遠數多則其氣緩不能速達於下必大劑而數少取其迅急可以走下也心肺位近數少則其氣急不能發散於上必小劑而數多取其氣易散可以補上也王注曰肺服九心服七脾服五肝服三腎服一乃五臟生成之常數也若奇之不去則偶之是謂重方也偶之不去則反佐以取之所謂寒熱溫涼反從其病也王注曰是以聖人反其佐以同其氣令聲氣應合復令寒熱參合使其終異始同燥潤而敗堅剛必折柔脆自消爾故逆者正治從者反治從少從多觀其可也仲景曰少陰病下利而脈微者與白通湯利不止厥逆無脈者乾嘔煩者白通加豬膽人尿注曰若調寒熱之逆冷熱必行則熱物冷服下嗌之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此加人尿豬膽汁鹹苦寒物於白通湯熱劑中要其氣相從可去格拒之寒也經所謂熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已此之謂也若病所遠而中道氣味之者食而過之無越其制度王注曰假命病在腎而心之氣味飼而冷是仍急過之不飼以氣味腎藥凌心心腹益衰與上下遠近例同是以聖人治上不犯下治下不犯上和中上下俱無犯故經所謂誅罰無過命曰大惑此之謂也有中外不相及則治其主病皆論標本不令妄攻也故從所來者為本其所受者為標是以內者內調外者外治內者調之不言其治外者治之不言其調經所謂上淫於下所勝平之外淫於內所勝治之此之謂也若從內之外盛於外先調其內而後治其外從外之內而盛於內者先治其外而後調其內王注曰皆謂先除其根底後削其枝條也是故病發有餘本而標之後治其本故仲景曰傷寒醫下之續得下利清穀身疼痛者急當救里後身疼痛清便自調急當救表救里四逆湯救表宜桂枝湯故里不足必先救之清便自調知裡氣已調然後急與桂枝湯以救表是謂病發本而標之先治其本後治其標此以寒為本也故知標本者萬舉萬全不知標本是謂妄行此之謂也雖本草曰上藥一百二十種為君應天中藥一百二十種為臣應人下藥一百二十種為使應地若治病者特謂此三品之說末也經所謂有毒無毒所治為主適小大為制也故主病之謂君佐君之謂臣應臣之謂使非上中下三品之謂也王注曰但能破積愈疾解急脫死則為良方非必要以先毒為是後毒乃非有毒為是無毒為非必量病輕重大小制之者也帝曰三品何謂岐伯曰所以明善惡之殊貫也是以聖人有毒無毒服自有約故病有久新方有大小有毒無毒固宜常制矣大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法王注曰法謂前四約也余病不盡然再行之毒之小大如約而止必無過也是以上古聖人謂重身之毒有故無殞衰其大半而止故藥之性味本以藥治疾誠能處以中庸以疾適當且如半而止之亦何疑於攻治哉此之謂也故非調氣而得者治之奈何有毒無毒何先何後願聞其道王注曰夫病生之類其有四焉一者始因氣動而內有所成為積聚癥瘕瘤氣癭起結核癲癇之類是也二者不因氣動而外有所成者謂癰腫瘡瘍痂疥疽痔掉瘛浮腫目赤瘭疹胕腫痛癢之類是也三者不因氣動而病生於內留飲澼食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類是也四者不因氣動而病生於外為瘴氣賊魅蟲蛇蠱毒蜚尸鬼擊沖薄墮墜風寒暑濕斫射剌割捶朴之類是也如此四類者有獨治內而可愈大小承氣陷胸抵當湯三花神祐藏用之類是也有兼治內而愈者大小柴胡通聖洗心涼膈黃連解毒之類是也有獨治外而愈者善應膏拔毒散點眼藥生肌之類是也有兼治外而愈者撥雲散苦參散千金內托散之類是也有先治內後治外而愈者瘭疹丹毒瘡瘍癰疽斑疹之類悉因三焦相火熱甚於內必先疏啓其中涼苦寒之劑蕩滌臟腑或以砭射敷掃塗抹於外者是也有先治其外後治其內而愈者傷寒刺割破傷皆因風寒之邪從外之內先以發散其外發之不已量其淺深峻泄之有齊毒而攻擊者暴病大小便不利胎死堅積滿脹之類是也復有無毒而調引者痰滯氣痞胃虛脾弱氣不往來以通經利其氣之藥之類是也方法所施或勝或復寒者熱之熱者寒之溫者清之散者收之抑者折之燥者潤之急者緩之剛者耎之衰者補之強者瀉之堅者削之留者攻之客者除之勞者溫之溫養也結者散之燥者濡之損者溫之溫補也逸者行之勞者動之驚者平之平常也常見常聞上之吐之下之泄之磨之灸之浴之薄之劫之燔之針劫其下開之發之適可為故各安其氣必清必淨則病氣衰去歸其所宗此治之大體也是以聖人法無定體體變布施藥不執方合宜而用故論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治諸寒而熱者取之以陰熱之寒者取之以陽所謂求其屬也王注曰謂治之而病不衰退反因熱寒而隨生寒熱病之新者也謂其益火之原以消陰翳用水之主以制陽光故曰求其屬也夫取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行若強腎之陰熱之猶可此論五味所歸五臟寒熱溫涼之主也嗚呼聖人之道久塞而後之人獨不能之也王注曰言少可以貫多舉淺可以料深何法之明也如此故非聖人之道孰能至於是耶是以治病之本須明氣味之厚薄七方十劑之法也方有七劑有十故方不七不足以盡方之變劑不十不足以盡劑之用方不對病非方也劑不蠲疾非劑也今列而論之七方者大小緩急奇偶復大方之說有二一則病有兼證而邪不專不可以一二味治之宜君一臣三佐九之類是也二則治腎肝在下而遠者宜分兩多而頓服之是也小方之說有二一則病無兼證邪氣專一可以君一臣二小方之治也二則治心肺在上而近者宜分兩微而頻頻少服之亦為小方之治也緩方之說有五有甘以緩之為緩方者為糖蜜甘草之類取其戀膈也有丸以緩之為緩方者蓋丸之比湯散藥力宣行遲故也有品味群衆之緩方者蓋藥味衆多各不能騁其性也有無毒治病之緩方者蓋藥性無毒則攻自緩也有氣味薄而緩方者藥氣味薄則常補於上比至其下藥力既已衰為補上治上之法也急方之說有四有急病急攻之急方者如腹心暴痛前後閉塞之類是也有急風蕩滌之急方者謂中風不省口噤是也取湯劑蕩滌取其易散而施攻速者是也有藥有毒之急方者如上湧下泄奪其病之大勢者是也有氣味厚之急方者藥之氣味厚者直趣於下而力不衰也謂補下治下之法也奇方之說有二有古之單行之奇方者為獨一物是也有病近而宜用奇方者為君一臣二君二臣三數合於陽也故宜下不宜汗也偶方之說有二有兩味相配而為偶方者蓋兩味相合者是也有病遠而宜用偶方者君二臣四君四臣六數合於陰也故宜汗不宜下也復方之說有二有二三方相合之為復方者如桂枝二越婢一湯之類是也有分兩勻同之復方者如胃風湯各等分之類是也又曰重復之復二三方相合而用也反復之復謂奇之不去則偶之是也十劑者宣通補瀉輕重澀滑燥濕宣者宣散也鬱而不散為壅必宣劑以散之如痞滿不通之類是也本草曰宣可去壅必宣劑以散之如姜橘之屬攻其里則宣者上也泄者下也湧劑則瓜蒂梔豉之類是也發汗通表亦同通留而不行為滯必通劑以行之如水病痰癖之類也本草曰通可去滯通草防己之屬攻其內則通者行也甘遂滑石茯苓芫花大戟牽牛木通之類是也補不足為弱必補劑以扶之如氣形羸弱之類是也本草曰補可去弱人參羊肉之屬攻其里則補養也經所謂言而微終日乃復言者此奪氣也故形不足溫之以氣精不足補之以味是以膏粱理疾藥石蠲疾五穀五畜能補善養也瀉有餘為閉必泄劑以逐之如腹脹脾約之類是也本草曰瀉可去閉即葶藶大黃之屬經所謂濁氣在上則生䐜脹故氣不施化而鬱閉不通所以葶藶大黃味苦大寒專能瀉熱去濕下氣仲景曰趺陽脈浮而澀浮則胃強澀則小便數浮澀相搏大便難其脾為約故約束津液不得四布苦寒之劑通塞潤燥而能泄胃強也輕實則氣壅欲其揚也如汗不發而腠密邪勝而中蘊必輕劑以揚之本草曰輕可去實麻黃葛根之屬經所謂邪在皮者汗而發之其實者散而泄之王注曰陽實則發散重怯則氣浮欲其鎮也如喪神守而驚悸氣上厥以顛疾必重劑以鎮之本草曰重可去怯即磁石鐵粉之屬經所謂厥成為癲疾故驚乃平之所以鎮涎也故使其物體之重則下涎而用之也澀滑則氣脫欲其收斂也如開腸洞泄便溺遺失必澀劑以收之本草曰澀可去脫則牡蠣龍骨之屬如寧神寧聖散之類是也滑澀則氣著欲其利也如便難內閉必滑劑以利之本草曰滑可去著即冬葵榆皮之屬滑能養竅故潤利也燥濕淫氣勝腫滿脾濕必燥劑以除之本草曰燥可去濕即桑白皮赤小豆之屬所謂濕甚於上以苦燥之以淡泄之是也濕津耗為枯五臟痿弱榮衛涸流必濕劑以潤之本草曰濕可去枯即紫石英之屬故痿弱者用之王注曰心熱盛則火獨光火獨光則內炎上腎之脈常下行今火盛而上炎用事故腎脈亦隨火炎爍而逆上行也陰氣厥逆火復內燔陰上隔陽下不守位心氣通脈故生脈痿腎氣主足故膝腕樞紐如折去而不相提挈脛筋縱緩而不能任用於地也可下數百行而愈故此十劑七方者乃太古先師設繩墨而取曲直何叔世方士出規矩以為方圓王注曰嗚呼人之死者但曰命不謂方士愚昧而殺之邪是以物各有性以謂物之性有盡也制而用之將使之無盡物之用有窮也變而通之將使之無窮夫惟性無盡用無窮故施於品劑以佐使斯人其功用亦不可一而足也於是有因其性而為用者有因其所勝為制者有氣同則相求者有氣相剋則相制者有氣有餘而補不足者有氣相感則以意使者有質同而性異者有名異而實同者故蛇之性上竄而引藥蟬之性脫而退翳虻飲血而用以治血鼠善穿而用以治漏所謂因其性而為用者如此弩牙速産以機發而不括也杵糠下噎以杵築下也所謂因其用而為使者如此萍不沉水可以勝酒獨活不搖風可以治風所謂因其所勝而為之用制也如此麻木谷而治風豆水穀而治水所謂氣相同則相求者如此牛土畜乳可以止渴疾豕水畜心可以鎮恍惚所謂因其氣相剋則相制也如此熊肉振羸兔肝明視所謂因其氣有餘補不足也如此鯉之治水鶩之利水所謂因其氣相感則以意使者如此蜂蜜成於蜂蜜溫而蜂寒油本生於麻麻溫而油寒茲同質而異性也蘼蕪生於芎藭蓬虆生於覆盆茲名異而實同者也所以如此之類不可勝舉故天地賦形不離陰陽形色自然皆有法象毛羽之類生於陽而屬於陰鱗介之類生於陰而屬於陽空青法水色青而主肝丹砂法火色赤而主心雲母法金色白而主肺磁石法水色黑而主腎黃石脂法土色黃而主脾故觸類而長之莫不有自然之理也欲為醫者上知天文下知地理中知人事三者俱明然後可以愈人之疾病不然則如無目夜遊無足登涉動致顛殞而欲愈疾者未之有也故治病者必明天地之理道陰陽更勝之先後人之壽夭生化之期乃可以知人之形氣矣王注曰不明天地之理又昧陰陽之候則以壽為夭以夭為壽雖盡上聖救生之道心明經脈藥石之妙猶未免世中之誣斥也明乎醫者幸詳究焉
