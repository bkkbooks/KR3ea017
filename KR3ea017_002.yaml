body:
  text: 卷中中風論第十論曰經云風者百病之始善行而數變行者動也風本生於熱以熱為本以風為標凡言風者熱也叔和云熱則生風冷生氣是以熱則風動宜以靜勝其躁是養血也治須少汗亦宜少下多汗則虛其衛多下則損其榮汗下各得其宜然後宜治在經雖有汗下之戒而有中臟中腑之說中腑者宜汗之中臟者宜下之此雖合汗下亦不可過也仲景曰汗多則亡陽下多則亡陰亡陽則損其氣亡陰則損其形經曰血氣者人之神不可不謹養也初謂表裡不和須汗下之表裡已和是宜治之在經也其中腑者面加五色有表證脈浮而惡風惡寒拘急不仁或中身之後或中身之前或中身之側皆曰中腑也其治多易中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便秘結皆曰中臟也其治多難經曰六腑不和流經為癰五臟不和九竅不通若外無留結內無不通必知在經也初證既定宜以大藥養之當順時令而調陰陽安臟腑而和榮衛察病機審氣宜而少有不愈者若風中腑者先以加減續命湯隨證發其表若忽中臟者則大便多秘澀宜以三化湯通其滯表裡證已定別無他變故以大藥和治之大抵中腑者多著四肢中臟者多滯九竅雖中腑者多兼中臟之證至於舌強失音久服大藥能自愈也有中風濕者夏月多有之其證身重如山不能轉側宜服除濕去熱之藥治之不可用針可用灸今具六經續命湯通治八風五痹痿厥等疾以一歲為總以六經為別春夏加石膏知母黃芩秋冬加桂附又於六經別藥隨證細分加減自古名醫不能越此凡覺中風必先審六經之候慎勿用大熱藥烏附之類故陽劑剛勝積火燎原為消狂瘡腫之屬則天癸竭而榮衛涸是以中風有此誡故經所謂邪風之至疾如風雨易曰撓萬物者莫疾乎風若感之淺者留於肌膚感之深者達於骨髓蓋禍患之機藏於細微非常人之豫見及其至也雖智者不能善其後是以聖人之教下皆謂之虛邪賊風避之有時故中風者俱有先兆之證凡人如覺大拇指及次指麻木不仁或手足不用或肌肉蠕動者三年內必有大風之至經曰肌肉蠕動名曰微風宜先服八風散愈風湯天麻丸各一料為效故手大指次指手太陰陽明經風多著此經也先服祛風滌熱之劑辛涼之藥治內外之邪是以聖人治未病不治已病又曰善治者治皮毛是止於萌芽也故初成獲愈固久者伐形是治病之先也中風之人如小便不利不可以藥利之既得自汗則津液外亡小便自少若利之使榮衛枯竭無以制火煩熱愈甚當候熱退汗止小便自行也兼此證乃陽明大忌利小便須當識此中風之人能食者凡中風病多能食蓋甲己化土脾盛故能食由是多食則脾氣愈盛土剋制腎水水虧則病增劇也病宜廣服藥不欲多食病能自愈中風多食風木盛也盛則克脾脾受敵求助於食經曰實則夢與虛則夢取是也當瀉肝木治風安脾脾安則食少是其效也中風之人不宜用龍麝犀珠譬之提鈴巡於街使盜者伏而不出益使風邪入於骨髓如油入面莫能出也此之類焉若痰潮不省昏憒不知事宜用藥下其痰涎故風者乃百病之長庸可忽諸小續命湯麻黃去節人參黃芩芍藥防己桂枝川芎甘草各一兩防風一兩半附子半兩杏仁一兩上除附子杏仁外搗為粗末後入二味令勻每服五七錢水一盞半生薑五片煎至一盞去滓稍熱服食前凡中風不審六經之加減雖治之不能去其邪也內經云開則淅然寒閉則熱而悶知暴中風邪宜先以加減續命湯隨證治之中風無汗惡寒麻黃續命主之麻黃防風杏仁依本方添加一倍宜針太陽至陰出血崑崙陽蹺中風有汗惡風桂枝續命主之桂枝芍藥杏仁依本方添加一倍宜針風府以上二證皆太陽經中風也中風無汗身熱不惡寒白虎續命主之石膏知母一料中各加二兩甘草依本方加一倍中風有汗身熱不惡風葛根續命主之葛根二兩桂枝黃芩依本方加一倍宜針陷谷刺厲兌針陷谷者去陽明之賊刺厲兌者瀉陽明經之實也以上二證陽明經中風也中風無汗身涼附子續命主之附子加一倍乾薑加二兩甘草加三兩宜刺隱白穴去太陰之賊也此一證太陰經中風也中風有汗無熱桂枝續命主之桂枝附子甘草依本方加一倍宜針太谿此證少陰經中風也中風六證混淆系之於少陽厥陰或肢節攣痛或麻木不仁宜羌活連翹續命主之小續命八兩加羌活四兩連翹六兩古之續命混淆無六證之別今各分經療治又分經針刺法厥陰之井大敦刺以通其經少陽之經絕骨灸以引其熱是針灸同象法治之大體也中風外無六經之形證內無便溺之阻格知血弱不能養筋故手足不能運動舌強不能言語宜養血而筋自榮大秦艽湯主之秦艽三兩甘草二兩川芎二兩當歸二兩白芍藥二兩細辛半兩川羌活防風黃芩各一兩石膏二兩吳白芷一兩白朮一兩生地黃一兩熟地黃一兩白茯苓一兩川獨活二兩上十六味剉每服一兩水煎去渣溫服無時如遇天陰加生薑煎七八片如心下痞每兩加枳實一錢同煎中風外有六經之形證先以加減續命湯隨證治之內有便溺之阻格復以三化湯主之厚朴大黃枳實羌活各等分上剉如麻豆大每服三兩水三升煎至一升半終日服之以微利為度無時法曰四肢不舉俗曰癱瘓故經所謂太過則令人四肢不舉又曰土太過則敦阜阜高也敦厚也既厚而又高則令除去此真所謂膏粱之疾非肝腎經虛何以明之經所謂三陽三陰發病為偏枯痿易四肢不舉王注曰三陰不足以發偏枯三陽有餘則為痿易易謂變易常用而痿弱無力也其治則瀉令氣弱陽衰土平而愈或三化湯調胃承氣湯選而用之若脾虛則不用也經所謂土不及則卑陷卑下也陷坑也故脾病四肢不用四肢皆稟氣於胃而不能至經必因於脾乃得稟受也今脾不能與胃行其津液四肢不能稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉其治可補十全散加減四物去邪留正愈風湯中風證內邪已除外邪已盡當服此藥以行導諸經久服大風悉去縱有微邪只從此藥加減治之然治病之法不可失其通塞或一氣之微汗或一旬之通利如此為常治之法也久則清濁自分榮衛自和如初覺風動服此不致倒僕羌活甘草防風蔓荊子川芎細辛枳殼人參麻黃甘菊薄荷枸杞子當歸知母地骨皮黃耆獨活杜仲吳白芷秦艽柴胡半夏前胡厚朴熟地黃防己各二兩茯苓黃芩各三兩石膏四兩芍藥三兩生地黃蒼朮各四兩桂枝一兩以上三十三味通七十四兩上剉每服一兩水二盞煎至一盞去渣溫服如遇天陰加生薑煎空心一服臨臥再煎藥渣服俱要食遠服空心一服噀下二丹丸為之重劑臨臥一服噀下四白丹為之輕劑動以安神靜以清肺假令一氣之微汗用愈風湯三兩麻黃一兩均作四服一服加生薑五片空心服以粥投之得微汗則佳如一旬之通利用愈風三兩大黃一兩亦均作四服如前煎臨臥服得利則妙常服之藥不可失四時之轉如望春大寒之後加半夏二兩通四兩柴胡二兩通四兩人參二兩通四兩謂迎而奪少陽之氣也初夏之月加石膏二兩通六兩黃芩二兩通五兩知母二兩通四兩謂迎而奪陽明之氣也季夏之月加防己二兩通四兩白朮二兩茯苓二兩通五兩謂勝脾土之濕也初秋大暑後加厚朴二兩通四兩藿香二兩桂一兩通二兩謂迎而奪太陰之氣也霜降之後望冬加附子一兩桂一兩通二兩當歸二兩通四兩謂勝少陰之氣也得春減冬四時類此雖立法於四時之加減又宜臨病之際審病之虛實熱寒土地之宜邪氣之多少此藥具七情六慾四氣無使五臟偏勝及不動於榮衛如風秘服之則永不燥結如久瀉服之則能自調初覺風氣便能服此藥及新方中天麻丸各一料相為表裡治未病之勝藥也及已病者更宜常服無問男子婦人及小兒驚癇搐急慢驚風等病服之神效如解利四時傷風隨四時加減法又療脾腎虛筋弱語言難精神昏憒及治內弱風濕內弱者乃風濕火先體重者乃風濕土余內弱之為病或一臂肢體偏枯或肥而半身不遂或恐而健忘喜以多思故思忘之道皆情不足也是以心亂則百病生心靜則萬病悉去故此能安心養神調陰陽無偏勝及不動榮衛四白丹能清肺氣養魄謂中風者多昏冒氣不清利也白朮半兩白芷一兩白茯苓半兩白檀一兩半人參半兩知母三錢縮砂仁半兩羌活二錢半薄荷三錢半獨活二錢半防風川芎各五錢細辛二錢甘草五錢甜竹葉一兩香附子五錢炒龍腦半錢另研麝香一字另研牛黃半錢藿香一錢半上件二十味計八兩六錢一字為細末煉蜜為丸每兩作十丸臨臥嚼一丸分五七次嚼之上清肺氣下強骨髓二丹丸治健忘養神定志和血內安心神外華腠理丹參一兩半丹砂二錢為衣遠志去心半兩茯神一兩人參五錢菖蒲五錢熟地黃一兩半天門冬一兩半去心麥門冬一兩去心甘草一兩上為細末煉蜜為丸如桐子大每服五十丸至一百丸空心食前常服安神定志一藥清肺一藥安神故清中清者歸肺以助天真清中濁者堅強骨髓血中之清榮養於神血中之濁榮華腠理如素有痰久病中風津液湧溢在胸中氣所不利用獨聖散吐之後用利氣瀉火之劑本方在後瀉青丸治中風自汗昏冒發熱不惡寒不能安臥此是風熱煩躁當歸龍膽川芎梔子羌活大黃防風各等分上為細末煉蜜為丸如彈子大每服一丸竹葉湯化下天麻丸系新方中天麻三兩酒浸三日曝乾秤牛膝六兩同上浸當歸十兩杜仲七兩炒去絲玄參六兩羌活十兩萆薢六兩別碾為細末秤生地黃十六兩附子一兩上為細末煉蜜為丸如桐子大常服五七十丸病大至百丸空心食前溫酒或白湯下平明服藥至日高飢則止服藥大忌壅塞失於通利故服藥半月稍覺壅微以七宣丸輕疏之使藥再為用也牛膝萆薢治筋骨杜仲治筋骨相著天麻羌活利風之勝藥當歸地黃養血能和榮衛玄參主用附子佐之行經也獨聖散治諸風膈實諸癇痰涎津液湧溢雜病亦然瓜蒂一兩上剉如麻豆大炒令黃色為細末每服量虛實久新或三錢藥末茶一錢酸齏汁一盞調下若用吐法天氣晴明陰晦毋用如病卒暴者不拘於此法吐時辰巳午前故內經曰平旦至日中天之陽陽中之陽也論四時之氣仲景曰大法春宜吐是天氣在上人氣亦在上一日之氣寅卯辰之候也故宜早不宜夜也先令病人隔夜不食服藥不吐再用熱齏水投之如吐風癇病者加全蠍半錢微炒如有蟲者加狗油五七點雄黃末一錢甚者加芫花末半錢立吐其蟲出如濕腫滿者加赤小豆末一錢故此不可常用大要辨其虛實實則瓜蒂散虛則梔子豉湯滿加厚朴不可一概用之吐罷可服降火利氣安神定志之劑治風癇病不能愈者從厚朴丸宜春秋加添外又於每一料中加人參菖蒲茯神去木各一兩半上依厚朴丸春秋加添法和劑服餌厚朴丸方在吐論中防風通聖散防風川芎當歸芍藥大黃芒硝連翹薄荷麻黃不去節各半兩石膏桔梗黃芩各一兩白朮山梔子荊芥穗各二錢半滑石三兩甘草二兩上為粗末每服一兩生薑同煎溫服日再服勞汗當風汗出為皶郁乃痤勞汗出於玄府脂液所凝去芒硝倍加芍藥當歸發散玄府之風當調其榮衛俗云風刺或生癮疹或赤或白倍加麻黃鹽豉蔥白出其汗麻黃去節亦去芒硝咸走血而內凝故不能發汗罷依前方中加四物湯黃連解毒三藥合而飲之日二服故內經曰以苦發之謂熱在肌表連內也小便淋閉去麻黃加滑石連翹煎藥湯調木香末二錢麻黃主表不主於裡故去之腰脅痛走注疼痛者加硝石當歸甘草一服各二錢調車前子末海金砂各一錢內經曰腰者腎之府破傷風者如在表則辛以散之在裡則苦以下之兼散之汗下後通利血氣祛逐風邪每一兩內加荊芥穗大黃各二錢調全蠍末一錢羌活末一錢諸風潮搐小兒急慢驚風大便秘結邪熱暴甚腸胃乾燥寢汗咬牙上竄睡語筋轉驚悸肌肉蠕動每一兩加大黃二錢梔子二錢調茯苓二錢如肌肉蠕動者調羌活末一錢故經曰肌肉蠕動命曰微風風傷於肺咳嗽喘急每一兩加半夏桔梗紫菀各二錢如打撲傷損肢節疼痛腹中惡血不下每一兩加當歸大黃各三錢半調沒藥乳香末各二錢解利四時傷寒內外所傷每一兩內加益元散一兩蔥白十莖鹽豉一合生薑半兩水一碗同煎至五七沸或煎一小碗溫冷服一半以筋探之即吐罷後服一半稍熱服汗出立解如飲酒中風身熱頭痛如破者加黃連須二錢蔥白十莖依法立愈慎勿用桂枝麻黃解之頭旋腦熱鼻塞濁涕時下每一兩加薄荷黃連各二錢半內經曰膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不已也王注曰膽移熱於腦腦液下滲則為濁涕涕下不止如彼水泉故曰鼻淵也此為足太陽脈與陽明之脈俱盛也如氣逆者調木香末一錢癘風論第十一內經曰癘者有榮氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風又曰脈風成為癘俗云癩病也故治法云病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日王注曰泄衛氣之怫熱刺骨髓汗出百日泄榮氣之怫熱凡二百日鬚眉生而止針怫熱屏退陰氣內復故多汗出鬚眉生也先樺皮散從少至多服五七日後灸承漿穴七壯灸瘡輕再灸瘡愈再灸後服二聖散泄熱祛血之風邪戒房室三年針灸藥止述類象形此治肺風之法也然非止肺臟有之俗云鼻屬肺而病發於肺端而言之不然如此者既鼻準腫赤脹但為瘡之類乃謂血隨氣化既氣不施化則血聚矣然血既聚使肉腐爛而生蟲也謂厥陰主生五蟲厥陰為風木故木主生五蟲蓋三焦相火熱甚而制金金衰故木來克侮經曰侮勝也宜瀉火熱利氣之劑蟲自不生也法云流水不腐戶樞不蠹此之謂也故此疾血熱明矣當以藥緩疏泄之煎局方內升麻湯下錢氏內瀉青丸余各隨經言之故病風者陽氣先受傷也樺皮散治肺臟風毒遍身瘡疥及癮疹瘙癢搔之成瘡又治面風刺及婦人粉刺樺皮四兩燒灰荊芥穗二兩甘草半兩炙杏仁二兩去皮尖用水一碗於銀器內熬去水一半放令乾枳殼四兩去蘆用炭火燒欲灰於濕紙上令冷上件除杏子外余藥為末將杏子別研令細次同諸藥令勻瓷盒內放之每服三錢食後溫酒調下二聖散治大風癘疾大黃半兩皂角刺三錢燒灰上將皂角刺一二斤燒灰研細煎大黃半兩湯調下二錢早服樺皮散中煎升麻湯下瀉青丸晚服二聖散此數等之藥皆為緩疏泄血中之風熱也七聖丸郁李仁去皮大黃蒸焙各一兩肉桂去粗皮羌活去蘆檳榔生木香生川芎各半兩七宣丸訶黎勒皮柴胡去苗洗枳實爁木香各五兩桃仁去皮尖爁六兩大黃麵裹煨十五兩甘草爁六兩皆治風壅邪熱潤利大腸中風風癇癘風大便秘澀皆可服之此方局方中治法曰雖訶子味苦澀而能止臟腑此利藥中用訶子令大黃枳實緩緩而推陳泄去邪氣若年老風秘澀者乃津液內亡也故不可用峻劑攻之內經曰年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣出矣故曰知之則強不知則老舉世皆言年老之人無熱俱虛豈不明年四十而陰氣自半故陰虛陽盛明矣是以陰虛其下陽甚於上故上實下虛此理明矣破傷風論第十二論曰夫風者百病之始也清淨則腠理閉拒雖有大風苛毒而弗能為害也故破傷風者通於表裡分別陰陽同傷寒證治閭閻往往有不知者只知有發表者不知有攻裡者和解者此汗下和三法也亦同傷寒證有在表者有在裡者有半在表半在裡者在裡宜下在表宜發汗在表裡之間宜和解然汗下亦不可過其法也又不可妄意處治各通其臟腑免汗泄之非宜也故破傷風者從外至內甚於內者則病也因此卒暴傷損風襲之間傳播經絡至使寒熱更作身體反強口噤不開甚者邪氣入臟則分汗下之治諸瘡不瘥榮衛虛肌肉不生瘡眼不合者風邪亦能外入於瘡為破傷風之候故諸瘡不瘥時舉世皆言著灸為上是謂熟瘡而不知火熱客毒逐經諸變不可勝數微則發熱甚則生風而搐或角弓反張口噤目邪皆因瘡鬱結於榮衛不得宣通而生亦有破傷不灸而病此者瘡著白痂瘡口閉塞氣難通泄故陽熱易為鬱結而熱甚則生風也故表脈浮而無力太陽也脈長而有力者陽明也脈浮而弦小者少陽也太陽宜汗陽明宜下少陽宜和若明此三法而治不中病者未之有也羌活防風湯治破傷風邪初傳在表羌活防風川芎藁本當歸芍藥甘草各一兩地榆華細辛各二兩上㕮咀每服五七錢水一盞半同煎至七分去滓熱服不拘時候量緊慢加減用之熱則加大黃二兩大便秘則加大黃一兩緩緩令過白朮防風湯若服前表藥過有自汗者宜服此藥白朮一兩防風二兩黃耆一兩上㕮咀每服五七錢水一盞半煎至一盞去滓溫服不拘時候臟腑和而有自汗可用此藥破傷風臟腑秘小便赤自汗不止者因用熱藥汗出不休故知無寒也宜速下之先用芎黃湯三二服後用大芎黃湯下之芎黃湯川芎一兩黃芩六錢甘草二錢上㕮咀每服五七錢水一盞半同煎至七分去渣溫服不拘時候三服即止再用下藥大芎黃湯川芎二兩羌活黃芩大黃各一兩上㕮咀依前煎服宜利為度發表雄黃散雄黃一錢防風二錢草烏一錢上件為細末每服一字溫酒調下里和至愈可服里不和不可服蜈蚣散蜈蚣一對鰾五錢左蟠龍五錢炒煙盡為度野鴿糞是也上件為細末每服一錢清酒調下治法依前用里和至愈可服但有里證不可服次當下之用前蜈蚣散四錢燒飯為丸如綠豆大每服一丸漸加六七丸清酒調蜈蚣少許送下宣利為度內外風去可常服羌活湯緩緩而治不拘時候服之羌活湯者治半在表半在裡也羌活湯羌活菊花麻黃川芎防風石膏前胡黃芩細辛甘草枳殼白茯苓蔓荊子各一兩薄荷半兩吳白芷半兩上㕮咀每服五錢水一盞半入生薑五片同煎至一盞去渣稍熱服不拘時候日進二服防風湯治破傷風同傷寒表證未解入里宜急服此藥防風羌活獨活川芎各等分上㕮咀每服五錢水一盞半煎至七分去滓溫服二三服後宜調蜈蚣散大效蜈蚣散蜈蚣一對鰾三錢上為細末用防風湯調下如前藥解表不已覺轉入里當服左龍丸微利看大便硬軟加巴豆霜服之左龍丸左蟠龍五錢炒白殭蠶鰾各五錢炒雄黃一錢上同為細末燒餅為丸如桐子大每服十五丸溫酒下如里證不已當於左龍丸末一半內入巴豆霜半錢燒餅為丸如桐子大每服一丸同左龍丸一處合服每服藥中加一丸如此漸加服至利為度若利後更服後藥若搐痓不已亦宜服後藥羌活湯也羌活湯羌活獨活防風地榆各一兩上㕮咀每服五錢水一盞半煎至一盞去滓溫服如有熱加黃芩有涎加半夏若病日久氣血漸虛邪氣入胃宜養血為度養血當歸地黃散當歸地黃芍藥川芎藁本防風白芷各一兩細辛五錢上㕮咀依前煎服雄黃散治表藥天南星三錢半夏天麻各五錢雄黃二錢半上為細末每服一錢溫酒調下如有涎於此藥中加大黃為下藥地榆防風散治破傷中風半在表半在裡頭微汗身無汗不可發汗宜表裡治之地榆防風地丁香馬齒莧各等分上件為細末每服三錢溫米飲調下白朮湯治破傷風大汗不止筋攣搐搦白朮葛根各一兩升麻黃芩各半兩芍藥二兩甘草二錢半上㕮咀每服一兩水一盞半煎至一盞去滓溫服不拘時候江鰾丸治破傷風驚而發搐臟腑秘澀知病在裡可用江鰾丸下之江鰾半兩剉炒野鴿糞半兩炒雄黃一錢白殭蠶半兩蜈蚣一對天麻一兩上件為細末又將藥末作二分用一分燒餅為丸如桐子大硃砂為衣後一分入巴豆霜一錢同和亦以燒餅為丸如桐子大不用硃砂為衣每服硃砂為衣者二十丸入巴豆霜者一丸第二服二丸加至利為度再服硃砂為衣藥病愈止沒藥散治刀箭所傷止血定痛定粉一兩風化灰一兩枯白礬三錢另研乳香半錢另研沒藥一字另研上件各研為細末同和勻再研摻之解利傷寒論第十三論曰傷寒之法先言表裡及有緩急三陽表當急里當緩三陰表當緩里當急又曰脈浮當汗脈沉當下脈浮汗急而下緩謂三陽表也脈沉下急而汗緩謂三陰里也麻黃湯謂之急麻黃附子細辛湯謂之緩內經云有漬形以為汗為汗之緩里之表也又曰在皮者汗而發之為汗之急表之表也急汗者太陽緩汗者少陰是臟腑之輸應也假令麻黃附子細辛湯是少陰證始得發熱脈沉里和無汗故漬形以為汗假令麻黃湯是太陽證頭項痛腰脊強脈浮無汗里和是也在皮者汗而發之也經曰治主以緩治客以急此之謂也麻黃湯麻黃去節五錢桂枝三錢甘草二錢炙杏仁去皮尖炒二十個上㕮咀都作一服水煎去滓溫服假令得肝脈其外證善潔面青善怒其三部脈俱弦而浮惡寒里和謂清便自調也麻黃湯內加羌活防風各三錢謂肝主風是膽經受病大便秘或泄下赤水無數皆里不和也假令得心脈其外證面赤口乾善笑其尺寸脈俱浮而洪惡寒里和謂清便自調也麻黃湯內加黃芩石膏各三錢謂主心熱是小腸受病也假令得脾脈其外證面黃善噫善思善味尺寸脈俱浮而緩里和惡寒麻黃湯內加白朮防己各五錢謂脾主濕是胃經受病也假令得肺脈其外證面白善嚏悲愁不樂欲哭其尺寸脈俱浮而澀里和惡寒麻黃湯內加桂枝生薑各三錢謂肺主燥是大腸受病也假令得腎脈其外證面黑善恐其尺寸脈俱浮而里和惡寒其麻黃湯內加附子生薑謂腎主寒是膀胱受病也以上各五證皆表之表謂在皮者急汗而發之也皆腑受病表之裡者下之當緩謂隨臟表證外顯尺寸脈俱浮而復有里證謂發熱飲水便利赤澀或泄下赤水按之內實或痛麻黃湯去麻黃杏仁與隨臟元加藥同煎作五服每下一證初一服加大黃半錢邪盡則止未盡第二服加大黃一錢邪未盡第三服加大黃一錢半如邪未盡又加之邪盡則止此所謂先緩而後急是表之裡證下之當緩也麻黃附子細辛湯麻黃半兩去根節細辛半兩去苗土附子一錢二分半炮裂去皮臍上㕮咀都作一服水煎去滓溫服假令得肝脈其內證滿閉淋溲便難轉筋其尺寸脈俱沉而弦里和惡寒肝經受病麻黃附子細辛湯內加羌活防風各三錢假令得心脈其內證煩心心痛掌中熱而噦其尺寸脈俱沉里和惡寒心經受病加黃芩石膏各三錢假令得脾脈其內證腹脹滿食不消怠惰嗜臥其尺寸脈俱沉里和惡寒脾經受病加白朮防己各三錢假令得肺脈其內證喘咳灑淅寒熱其尺寸脈俱沉里和惡寒肺經受病加生薑桂枝各三錢假令得腎脈其內證泄如下重足脛寒而逆其尺寸脈俱沉里和惡寒腎經受病更加附子生薑各三錢以上五證里之表也宜漬形以為汗皆臟受病也里者下之當急謂隨臟內證已顯尺寸脈俱沉復有里證者謂大小便秘澀或泄下赤水或瀉無數不能飲食不惡風寒發熱引飲其脈俱沉或按之內實而痛此謂裡實宜速下之麻黃附子細辛內去麻黃與隨臟元加藥內分作三服每下一證初一服加大黃三錢邪盡則止如邪未盡再一服加大黃二錢又未盡第三服加大黃一錢此先急而後緩謂里之裡也當速下之也通解利傷寒不問何經所受皆能混然解之謂不犯各經之受病雖不解盡亦無壞證羌活湯羌活二兩防風一兩川芎一兩黃芩一兩細辛三錢半甘草一兩炒黑地黃一兩炒白朮三兩如無用蒼朮加一兩上㕮咀每服五七錢水二盞煎至一盞無時溫服清如覺發熱引飲加黃芩甘草各一兩更隨證如頭痛惡風於白朮湯一兩內加羌活散三錢都作一服羌活散羌活一兩半川芎七錢細辛根二錢半如身熱依前加石膏湯四錢石膏湯石膏二兩知母半兩白芷七錢如腹中痛者加芍藥散三錢芍藥散芍藥二兩桂枝五錢如往來寒熱而嘔加柴胡散二錢半柴胡散柴胡根一兩半夏五錢洗加生薑煎如心下痞加枳實一錢如有里證加大黃初一服一錢次二錢又三錢邪盡則止論曰有汗不得服麻黃無汗不得服桂枝然春夏汗孔疏雖有汗不當用桂枝宜用黃耆湯和解秋冬汗孔閉雖無汗不當用麻黃宜用川芎湯和解春夏有汗脈乃微而弱惡風惡寒者乃太陽證秋冬之脈也亦宜黃耆湯無汗亦宜川芎湯秋冬有汗脈盛而浮發熱身熱者乃陽明證春夏之脈也亦宜黃耆湯無汗亦宜川芎湯大抵有汗者皆可用黃耆湯無汗者亦可用川芎湯黃耆湯有汗則可止也黃耆白朮防風各等分上㕮咀每服五七錢至十餘錢或半兩一兩水煎溫服清汗多惡風甚者加桂枝川芎湯無汗則可發也川芎白朮羌活各等分上㕮咀同黃耆湯煎法稍熱服惡寒甚及脈大浮可加麻黃法云五臟之脈寸關尺也今止言尺寸陰陽也如陽緩而陰急表和而里病陰緩而陽急里和而表病也若傷寒食少發渴只可和胃止渴不可太涼藥止之然恐涼藥止之損著胃氣必不能食也和胃白朮湯白朮茯苓起臥不能謂之濕身重是也小柴胡湯黃芩芍藥湯起臥不安眠睡不穩謂之煩梔豉湯竹葉石膏湯解利四時傷寒混解六經不犯禁忌大白朮湯白朮二兩防風羌活川芎各一兩黃芩五錢細辛三錢白芷一兩半石膏二兩知母七錢甘草五錢或一兩枳實五錢去穰上為粗末每服半兩水一盞半煎至一盞大溫服清未解更一服兩服藥滓又作一服春倍防風羌活夏倍黃芩知母季夏雨淫倍白朮白芷秋加桂枝五錢冬桂枝八錢或一兩立夏之後至立秋處暑之間傷寒者身多微涼微有自汗四肢沉重謂之濕溫又謂之濕淫宜蒼朮石膏湯蒼朮石膏湯蒼朮半兩石膏三錢知母一錢半甘草一錢上剉細同和均都作一服水二盞煎至一盞溫服清謂內有濕熱也多不欲飲水如身熱脈洪無汗多渴者是熱在上焦積於胸中宜桔梗散治之桔梗散薄荷黃芩甘草山梔子各一錢桔梗半兩連翹二錢上剉每服五錢或七錢秤半兩水煎加竹葉如大便秘結加大黃半錢熱論第十四論曰有表而熱者謂之表熱也無表而熱者謂之裡熱也有暴發而為熱者乃久不宣通而致也有服溫藥過劑而為熱者有惡寒戰慄而熱者蓋諸熱之屬者心火之象他王注曰百端之起皆自心生是以上善若水下愚若火治法曰少熱之氣涼以和之大熱之氣寒以取之甚熱之氣則汗發之發之不盡則逆治之制之不盡求其屬以衰之故曰苦者以治五臟五臟屬陰而居於內辛者以治六腑六腑屬陽而在於外故內者下之外者發之又宜養血益陰其熱自愈此所謂不治而治也故不治謂之常治治之不治謂之暴治經所謂諸寒而熱者取之陰諸熱而寒者取之陽此所謂求其屬也王注曰益火之源以消陰翳用水之主以制陽光此之謂也病有暴熱者病在心肺有積熱者病在腎肝暴熱者宜局方中雄黃解毒丸積熱者局方中妙香丸暴熱上喘者病在心肺謂之高喘木香金鈴子散上焦熱而煩者牛黃散臟腑秘者大黃牽牛散上焦熱無他證者桔梗湯有虛熱不能食而熱者脾虛也宜以厚朴白朮陳皮之類治之有實熱能食而熱者胃實也宜以梔子黃芩湯或三黃丸之類治之鬱金柴胡之類亦是也有病久憔悴發熱盜汗謂五臟齊損此熱勞骨蒸病也瘦弱虛煩腸澼下血皆蒸勞也宜養血益陰熱能自退當歸生地黃或錢氏地黃丸是也木香金鈴子散治暴熱心肺上喘不已大黃半兩金鈴子木香各三錢輕粉少許朴硝二錢上為細末柳白皮湯調下三錢或四錢食後服以利為度喘止即止牛黃散治上焦熱而煩不能睡臥梔子半兩大黃半兩鬱金半兩甘草二錢半上為細末每服五錢水煎溫服食後微利則已大黃牽牛散治相火之氣遊走臟腑大便秘結大黃一兩牽牛頭末五錢上為細末每服三錢有厥冷用酒調三錢無厥冷而手足煩熱者蜜湯調下食後微利為度此謂不時而熱者濕熱也地黃丸治久新憔悴寢汗發熱五臟齊損瘦虛弱煩腸澼下血骨蒸痿弱無力不能運動熟地黃一兩山茱萸四錢乾山藥四錢牡丹皮白茯苓澤瀉各三錢上為細末煉蜜為丸如桐子大每服五十丸空心溫酒送下如煩渴皮膚索澤食後煎服防風飲子空心服地黃丸防風當歸飲子柴胡人參黃芩甘草各一兩大黃當歸芍藥各半兩滑石三兩上為粗末每服五錢水一盞半生薑三片同煎至七分去滓溫服如痰實咳嗽加半夏如大便黃米穀完出驚懼溺血淋閉咳血衄血自汗頭痛積熱肺痿後服大金花丸大金花丸黃連黃柏黃芩山梔子各一兩上為細末滴水為丸如小豆大每服一百丸溫水下日二三服或大便實加大黃自利不用大黃如中外有熱者此藥剉作散服名解毒湯或腹滿嘔吐欲作利者每服半兩解毒湯中加半夏茯苓厚朴各三錢生薑三片如白膿下痢後重者加大黃三錢涼膈散加減附於後連翹山梔子大黃薄荷葉黃芩各半兩甘草一兩半朴硝二錢半上件為粗末每服半兩水一盞半煎至一盞去滓入蜜一匙微煎溫服食後咽嗌不利腫痛並涎嗽者加桔梗一兩荊芥穗半兩咳而嘔者加半夏二錢半生薑一錢如鼻衄嘔血者加當歸芍藥生地黃各半兩一料內服如淋閉者加滑石四兩茯苓一兩或閉而不通臍下狀如復碗痛悶不可忍者乃腸胃乾涸膻中氣不下故經所謂膀胱者州都之官津液藏焉氣化則能出矣故膻中者臣使之官名三焦相火下合右腎為氣海也王注曰膀胱位當孤府故謂都官居下內空故藏津液若得氣海之氣施化則溲便注泄氣海之氣不及則閟隱不通故不得便利也先用沉香木香各三錢酒調下或八正散甚則宜上湧之令氣通達小便自通經所謂病在下上取之王注曰熱攻於上不利於下氣盛於上則溫辛散之苦以利之可也當歸承氣湯當歸大黃各一兩甘草半兩芒硝九錢上剉如麻豆大每服二兩水一大碗入生薑五片棗十枚同煎至半碗去滓熱服若陽狂奔走罵詈不避親疏此陽有餘陰不足大黃芒硝去胃中實熱當歸補血益陰甘草緩中加生薑棗胃屬土此引至於胃中也經所謂微者逆之甚者從之此之謂也以大利為度微緩以瓜蒂散加防風藜蘆吐其病自愈後調洗心散涼膈散解毒湯等藥調治之牛黃膏治熱入血室發狂不認人者牛黃二錢半硃砂鬱金牡丹皮各三錢腦子甘草各一錢上為細末煉蜜為丸如皂子大新水化下治暴熱者局方中解毒雄黃丸雄黃碎飛鬱金各一分巴豆去皮出油十四個治久熱者局方中妙香丸辰砂飛研九兩牛黃龍腦膩粉研麝香研各三兩金箔九十片研巴豆三百一十粒去心腹炒研細治虛勞骨蒸煩熱下血者錢氏地黃丸治虛熱不能食者脾虛也宜以厚朴白朮陳皮之類治之治實熱能食者胃實也宜以梔子黃芩或三黃丸之類治之鬱金柴胡亦可治表熱惡寒而渴白虎湯也膚如火燎而熱以手取之不甚熱為肺熱也目白睛赤煩燥或引飲獨黃芩一味主之水煎兩脅下肌熱脈浮弦者柴胡飲子主之兩脅肋熱或一身盡熱者或日晡肌熱者皆為血熱也四順飲子主之夜發熱主行陰乃血熱也四順桃仁承氣選用當視其腹痛血刺痛與有表入里腹中轉失氣燥結之異晝則明瞭夜則譫語四順飲子證與桃仁承氣相似不可不辨也發熱雖無脅熱亦為柴胡證晝則行陽二十五度氣也大抵柴胡夜則行陰二十五度血也大抵四順飲子內傷論第十五論曰人之生也由五穀之精化五味之備故能生形經曰味歸形若傷於味亦能損形今飲食反過其節腸胃不能勝氣不及化故傷焉經曰壯火食氣氣食少火壯火散氣少火生氣痹論曰飲食自倍腸胃乃傷或失四時之調養故能為人之病也經曰氣口緊而傷於食心胸滿而口無味與氣口同氣口者乃脾之外候故脾胃傷則氣口緊盛夫傷者有多少有輕重如氣口一盛脈得六至則傷於厥陰乃傷之輕也檳榔丸主之氣口二盛脈得七至則傷於少陰乃傷之重也煮黃丸厚朴丸主之氣口三盛脈得八至則傷於太陰䐜塞悶亂甚則心胃大痛兀兀欲吐得吐則已俗呼食迷風是也經曰上部有脈下部無脈其人當吐不吐則死宜吐之以瓜蒂散如不能則無治也經曰高者因而越之下者引而竭之是也檳榔丸檳榔二錢半陳皮去白一兩木香二錢半牽牛頭末半兩上為細末醋糊為丸如桐子大每服十五丸至二十丸米飲下生薑湯亦可煮黃丸雄黃一兩另研巴豆五錢生用去皮研爛入雄黃末上二味再研入白麵二兩同再和研均滴水為丸如桐子大每服時先煎漿水令沸下藥二十四丸煮三十沸撈入冷漿水中沉冰冷一時下二丸一日二十四丸也加至微利為度用浸藥水送下此藥治脅下痃癖痛如神瓜蒂散瓜蒂三錢赤小豆三錢上為細末溫水調一錢以吐為度如傷之太重備急丸獨行丸皆急藥也金露丸治天行時疾內傷飲食心下痞悶大黃二兩枳實五錢麩炒牽牛頭末二兩桔梗二兩上同為細末燒餅為丸如桐子大每服三五十丸食後溫水下如常服十丸二十丸甚妙枳實丸治氣不下降食難消化常服進食逐飲枳實五錢麩炒白朮一兩上為細末燒餅為丸如桐子大每服五十丸米飲下治飲食不化心腹膨悶檳榔丸主之如甚則脅肋虛脹煮黃丸主之治氣不下降飲食難消金露丸主之諸瘧論第十六經曰夏傷於暑秋必病瘧蓋傷之淺者近而暴發傷之重者遠而痎瘧痎者久瘧也是知夏傷於暑濕熱閉藏而不能發泄於外邪氣內行至秋而發為瘧也初不知何經受之隨其動而取之有中三陽者有中三陰者大抵經中邪氣其證各殊同傷寒論之也故內經曰五臟皆有瘧其治各別在太陽經者謂之風瘧治多汗之在陽明經者謂之熱瘧治多下之在少陽經者謂風熱瘧治多和之此三陽經受病皆謂之暴瘧發在夏至後處暑前此乃傷之淺者近而暴也在陰經則不分三經總謂之濕瘧當從太陰經論之其病發在處暑後冬至前此乃傷之重者遠而為痎痎者老也故謂之久瘧氣居西方宜毒藥療之瘧之為病因內積暑熱之氣不能宣泄於外而為瘧也當盛夏之時能食寒涼之物而助陰氣者縱使有暑熱之氣微者自消矣更時復以藥疏利臟腑使邪氣自下內經曰春食涼夏食寒秋食溫冬食熱是謂春夏養陽秋冬養陰人能於飲食起居之間順四時之氣而行之邪氣何由得生也治瘧病處暑前頭痛項強脈浮惡風有汗桂枝羌活湯桂枝羌活防風甘草炙各半兩上為粗末每服半兩水一盞半煎至一盞溫服清迎發而服之如吐者加半夏曲等分治瘧病頭痛項強脈浮惡風無汗者麻黃羌活湯麻黃去節羌活防風甘草炙各半兩同前服如吐者加半夏曲等分治法瘧如前證而夜發者麻黃桂枝湯主之麻黃一兩去節甘草三錢炙桃仁三十個去皮尖黃芩五錢桂枝三錢上五味同為細末依前服桃仁味苦甘辛肝者血之海血聚則肝氣燥經所謂肝苦急急食甘以緩之故桃仁散血緩肝謂邪氣深遠而入血故夜發乃陰經有邪此湯發散血中風寒之劑治瘧病身熱目痛熱多寒少脈長睡臥不安先以大柴胡湯下之微利為度如下過外微邪未盡者宜服白芷湯以盡其邪白芷一兩知母一兩七錢石膏四兩上為粗末同前煎服治瘧無他證隔日發先寒後熱寒少熱多宜桂枝石膏湯桂枝五錢石膏知母各一兩半黃芩一兩上為粗末分作三服每服水一盞同前煎服間日者邪氣所舍深也治瘧寒熱大作不論先後皆太陽陽明合病也謂之交爭寒作則必戰動經曰熱勝而動也發熱則必汗泄經曰汗出不愈知為熱也陽盛陰虛之證當內實外虛不治必傳入陰經也當用桂枝芍藥湯主之桂枝三錢黃耆知母石膏芍藥各一兩上為粗末每服五七錢至半兩水煎如前藥服之寒熱轉大者知太陽陽明少陽三陽合病也宜用桂枝黃芩湯和之桂枝黃芩湯柴胡一兩二錢黃芩四錢半人參甘草各四錢半半夏四錢石膏知母各五錢桂枝二錢上為粗末依前服之服藥已如外邪已罷內邪未已再服下藥從卯至午時發者宜以大柴胡湯下之從午至酉時發者知其邪氣在血也宜以桃仁承氣湯主之前項下藥微利為度便以小柴胡湯徹其微邪之氣立秋之後及處暑前發瘧漸瘦不能食者謂之痎瘧此邪氣深遠而中陰經為久瘧也治久瘧不能飲食胸中鬱郁如吐欲吐不能吐者宜吐則已當以藜蘆散雄黃散吐之藜蘆散大藜蘆末半錢溫齏水調下以吐為度雄黃散雄黃瓜蒂赤小豆各一錢上為細末每服半錢溫齏水調下以吐為度治秋深久瘧胃中無物又無痰癖腹高而食少俗謂瘧氣入腹宜蒼朮湯主之蒼朮四兩草烏頭一錢杏仁三十個上為粗末都作一服水三升煎至一半均作三服一日服盡迎發而服局方中七宣丸治瘧之聖藥也局方中神效飲子乃瘧疾之聖藥也又名交結飲子吐論第十七論曰吐有三氣積寒也皆從三焦論之上焦在胃口上通於天氣主納而不出中焦在中脘上通天氣下通地氣主腐熟水穀下焦在臍下下通地氣主出而不納是故上焦吐者皆從於氣氣者天之陽也其脈浮而洪其證食已暴吐渴欲飲水大便燥結氣上衝而胸發痛其治當降氣和中中焦吐者皆從於積有陰有陽食與氣相假為積而痛其脈浮而弱其證或先痛而後吐或先吐而後痛治法當以毒藥去其積檳榔木香行其氣下焦吐者皆從於寒地道也其脈沉而遲其證朝食暮吐暮食朝吐小便清利大便秘而不通治法當以毒藥通其閉塞溫其寒氣大便漸通復以中焦藥和之不令大便秘結而自愈也治上焦氣熱上衝食已暴吐脈浮而洪宜先和中桔梗湯桔梗一兩半半夏曲二兩陳皮一兩去白枳實一兩麩炒白茯苓一兩去皮白朮一兩半厚朴一兩薑製炒香上㕮咀每服一兩水一盞煎至七分取清溫服調木香散二錢隔夜空腹食前服之三服之後氣漸下吐漸止然後去木香散加芍藥二兩黃耆一兩半每料中扣算加上件分兩依前服之病愈則已如大便燥結食不盡下以大承氣湯去硝微下之少利為度再服前藥補之如大便復結又依前再微下之木香散木香檳榔各等分上為細末煎藥調服治暴吐者上焦氣熱所沖也經曰諸嘔吐酸暴注下迫皆屬於火脈洪而浮者荊黃湯主之荊芥穗一兩人參五錢甘草二錢半大黃三錢上為粗末都作一服水二盞煎至一盞去滓調檳榔散二錢空心服檳榔散檳榔二錢木香一錢半輕粉少許上為細末用前藥調服如為丸亦可用水浸蒸餅為丸如小豆大每服二十丸食後服治上焦吐頭髮痛有汗脈弦青鎮丸主之柴胡二兩去苗黃芩七錢半甘草半兩半夏湯洗半兩青黛二錢半人參半兩上為細末薑汁浸蒸餅為丸如桐子大每服五十丸生薑湯下食後服白朮湯治胃中虛損及痰而吐者半夏曲半兩白朮一錢檳榔二錢半木香一錢甘草一錢茯苓二錢上六味同為細末每服二錢煎生薑湯調下食前吐而食不下脈弦者肝盛於脾而吐乃由脾胃之虛宜治風安脾之藥金花丸半夏湯洗一兩檳榔二錢雄黃一錢半上為細末薑汁浸蒸餅為丸如桐子大小兒另丸生薑湯下從少至多漸次服之以吐止為度羈絆於脾故飲食自下紫沉丸治中焦吐食由食積為寒氣相假故吐而痛宜服之半夏曲三錢烏梅二錢去核代赭石三錢杏仁一錢去皮尖丁香二錢縮砂仁三錢沉香一錢檳榔二錢木香一錢陳皮五錢白豆蔻半錢白朮一錢巴豆霜半錢另研上為細末入巴豆霜令勻醋糊為丸如黍米大每服五十丸食後生薑湯下吐愈則止小兒另丸治小兒食積吐食亦大妙一法治翻胃吐食用橘皮一個浸少時去白裹生薑一塊麵裹紙封燒令熟去面外生薑為三番並橘皮煎湯下紫沉丸一百丸一日二服得大便通至不吐則止此主治寒積氣皆可治嘔吐腹中痛者是有積也胃強而乾嘔有聲無物脾強而吐食持實擊強是以腹中痛當以木香白朮散和之木香白朮散木香一錢白朮半兩半夏曲一兩檳榔二錢茯苓半兩甘草四錢上為細末濃煎芍藥生薑湯調下一二錢有積而痛手按之愈痛無積者按之不痛治下焦吐食朝食暮吐暮食朝吐大便不通宜附子丸附子炮五錢巴豆霜一錢砒半錢研細上同研極細熔黃蠟為丸如桐子大每服一二丸冷水送下利則為度後更服紫沉丸常服不令再閉厚朴丸主反胃吐逆飲食噎塞氣上衝心腹中諸疾加法在後烏頭減半更妙厚朴二兩半黃連二兩半紫菀去苗土吳茱萸湯洗七次菖蒲柴胡去苗桔梗皂角去皮弦子炙茯苓去皮官桂刮乾薑炮各二兩人參二兩川烏頭炮裂去皮臍二兩半蜀椒二兩去目閉口者微炒出汗上為細末入巴豆霜一兩和勻煉蜜和為丸如桐子大每服三丸漸次加至以利為度生薑湯下食後臨臥服此藥治療與局方溫白丸同及治處暑以後秋冬間臟腑下利大效春夏再加黃連二兩秋冬再加厚朴二兩治風癇病不能愈者從厚朴丸依春秋加添外又於每料中加人參菖蒲茯苓各一兩半上依前法和劑服餌治反胃又大便不通者是腸勝胃也服局方中半硫丸硫黃明淨好者研令極細用柳木槌子絞過半夏湯洗七次焙乾為末各等分一二百丸如大便秘用後藥附子半兩巴豆二枚砒一豆許上為極細末生薑糊為丸如綠豆大每服一丸白湯下霍亂論第十八論曰醫之用藥如將帥之用兵本草曰良醫不能以無藥愈疾猶良將無兵不足以勝敵也故用藥如用兵轉筋霍亂者治法同用兵之急不可緩也故吐瀉不止者其本在於中焦或因渴大飲或因飲而過量或飢而飽甚或濕內甚故陰陽交而不和是為吐瀉仲景曰邪在上焦則吐邪在下焦則瀉邪在中焦則既吐且瀉此為急病也然吐利為急十死其一二如揮霍撩亂而不得吐瀉此名乾霍亂必死法曰既有其入必有所出今有其入而不得其出者痞也塞也故轉筋吐瀉者其氣有三一曰火二曰風三曰濕吐為暍熱也王注曰炎熱薄爍心之氣也火能炎上故吐也瀉為濕也叔和云濕多成五泄內經曰濕勝則濡瀉又曰風勝則動筋屬肝而應於風木故腳轉筋燥急也內經曰諸轉反戾水液渾濁皆屬於熱故仲景治法曰熱多欲飲水五苓散寒多不飲水者理中丸凡覺此證或先五苓益元桂苓甘露飲乃吐瀉之聖藥也慎無與粟米粥湯谷入於胃則必死本草曰粟米味鹹微寒無毒主養胃氣去脾胃中熱益氣霍亂者脾胃極損不能傳化加以粟米如人慾斃更以利刀鋸其首豈有能生者耶如吐瀉多時欲住之後宜微以粥飲漸以養之以遲為妙半夏湯治霍亂轉筋吐瀉不止半夏曲茯苓白朮各半兩淡桂二錢半甘草炙二錢半上為細末渴者涼水調下不渴者溫水調下不計時候五苓散白朮茯苓木豬苓各一兩半澤瀉二兩半桂枝一兩上為細末冷水調下或水煎三沸冷服亦得理中丸白朮人參乾薑甘草各等分上為細末煉蜜為丸如彈子大每服一丸冷水化下如吐瀉不止身出冷汗無脈者可服後瀉痢論中漿水散兼桂枝湯白朮湯皆可用後痢門中藥亦可選用凡霍亂不可飲熱白米湯飲之死必不救切須慎之瀉痢論第十九論曰臟腑瀉痢其證多種大抵從風濕熱論是知寒少而熱多寒則不能久也故曰暴瀉非陽久瀉非陰論曰春宜緩形形緩動則肝木乃榮反靜密則是行秋令金能制木風氣內藏夏至則火盛而金去獨火木旺而脾土損矣輕則飧泄身熱脈洪谷不能化重則下痢膿血稠黏皆屬於火經曰溲而便膿血知氣行而血止也宜大黃湯下之是為重劑黃芩芍藥湯為之輕劑是實則瀉其子木能自虛而脾土實矣故經曰春傷於風夏生飧紲此逆四時之氣人所自為也有自太陰脾經受濕而為水泄虛滑微滿身重不知穀味假令春宜益黃散補之夏宜瀉之法云宜補宜瀉宜和宜止假令和則芍藥湯是也止則訶子湯是也久則防變而為膿血也脾傳腎謂之賊邪故難愈若先痢而後滑謂之微邪故易痊此皆脾土受濕天行為也雖聖智不能逃口食味鼻食氣從鼻而入留積於脾而為水瀉有厥陰經動下痢不止其脈沉而遲手足厥逆涕唾膿血此為難治宜麻黃湯小續命汗之法曰謂有表邪縮於內當散表邪而愈有暴下無聲身冷自汗小便清利大便不禁氣難布息脈微嘔吐急以重藥溫之漿水散是也故法云後重則宜下腹痛則宜和身重則除濕脈弦則去風血膿稠黏以重藥竭之身冷自汗以毒藥溫之風邪內縮宜汗之則愈鶩溏為痢當溫之又云在表者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之又曰盛者和之去者送之過者止之兵法云避其來銳擊其惰歸此之謂也凡病泄而惡風寒是太陰傳少陰土來剋水也用除濕白朮茯苓安脾芍藥桂黃連破血也火邪不能勝水也太陰經不能傳少陰而反火邪上乘肺經而痢必白膿也加黃連當歸之類又裡急後重脈大而洪實為裡熱而甚蔽是有物結墜也若脈浮大甚不宜下雖裡急後重而脈沉細弱者謂寒邪在內而氣散也可溫養而自愈裡急後重閉者大腸經氣不宣通也宜加檳榔木香宣通其氣如痢或泄而嘔者胃中氣不和也上焦不和治以生薑橘皮中焦不和治以芍藥當歸桂茯苓下焦不和寒治以輕熱甚以重熱藥大便虛秘澀久不愈恐太陰傳少陰多傳變為痢太陰傳少陰是為賊邪先以枳實厚朴湯以防其變若四肢懶倦小便少或不利大便走沉困飲食減宜調胃去濕白朮芍藥茯苓三味水煎服以白朮之甘能入胃而除脾胃之濕芍藥之酸澀除胃中之濕熱四肢困茯苓之淡泄能通水道走濕此三味泄痢須用此如發熱惡寒腹不痛加黃芩為主如未見膿而惡寒乃太陰欲傳少陰也加黃連為主桂枝佐之如腹痛甚者加當歸倍芍藥如見血加黃連為主桂當歸佐之如躁煩或先便白膿後血或發熱或惡寒非黃芩不止此上部血也如惡寒脈沉或腰痛或血痢下痛非黃連不能止此中部血也如惡寒脈沉先血後便非地榆不能止此下部血也如便膿血相雜而脈浮大慎不可以大黃下之下之必死謂氣下竭而陽無所收也凡陰陽不和惟可以分陰陽藥治之又云暴泄非陽久泄非陰大便完穀下有寒有熱者脈疾身多動音聲響亮暴注下迫此陽也寒者脈沉而細疾身不動作目睛不了了飲食不下鼻準氣息者姜附湯主之若身重四肢不舉朮附湯主之黃芩芍藥湯治泄痢腹痛或後重身熱久而不愈脈洪疾者及下痢膿血稠黏黃芩芍藥各一兩甘草五錢上為粗末每服半兩水一盞半煎至一盞濾清溫服無時如痛則加桂少許大黃湯治泄痢久不愈膿血稠黏裡急後重日夜無度久不愈者大黃一兩上細剉好酒二大盞同浸半日許再同煎至一盞半去大黃不用將酒分為二服頓服之痢止一服如未止再服以利為度服芍藥湯和之痢止再服黃芩湯和之以徹其毒也芍藥湯下血調氣經曰溲而便膿血氣行而血止行血則便膿自愈調氣則後重自除芍藥一兩當歸黃連各半兩檳榔二錢木香二錢甘草二錢炙大黃三錢黃芩半兩官桂一錢半上㕮咀每服半兩水二盞煎至一盞食後溫服如血痢則漸加大黃如汗後臟毒加黃柏半兩依前服白朮黃耆湯服前藥痢雖已除猶宜此藥和之白朮一兩黃耆七錢甘草三錢上㕮咀均作三服水一盞半煎至一盞去滓溫清服之防風芍藥湯治泄痢飧泄身熱脈弦腹痛而渴及頭痛微汗防風芍藥黃芩各一兩上㕮咀每服半兩或一兩水三盞煎至一盞濾清溫服治太陰脾經受濕水泄注下體微重微滿困弱無力不欲飲食暴泄無數水穀不化先宜白朮芍藥湯和之身重暴下是大勢來亦宜和之白朮芍藥湯白朮一兩芍藥一兩甘草五錢上剉每服一兩水二盞煎至一盞濾清溫服如痛甚者宜蒼朮芍藥湯蒼朮二兩芍藥一兩黃芩半兩上剉每服一兩加淡味桂半錢水一盞半煎至一盞溫服清如脈弦頭微痛者宜蒼朮防風湯蒼朮防風各二兩上使上剉同前煎服如下血者宜蒼朮地榆湯蒼朮二兩地榆一兩下使上剉同前煎服以上證如心下痞每服加枳實一錢如小便不利各加茯苓二錢如腹痛漸已瀉下微少宜訶子散止之法云大勢已去而宜止之訶子散訶子一兩半生半熟木香半兩黃連三錢甘草三錢上為細末每服二錢以白朮芍藥湯調下如止之不已宜歸而送之也訶子散加厚朴一兩竭其邪氣也虛滑久不愈者多傳變為痢疾太陰傳於少陰是為賊邪先以厚朴枳實湯防其傳變厚朴枳實湯厚朴一兩枳實一兩訶子一兩半生半熟木香半兩黃連二錢甘草三錢炙大黃二錢上為細末每服三五錢水一盞半煎至一盞去滓溫服漿水散治暴泄如水周身汗出一身盡冷脈微而弱氣少而不能語其甚者加吐此謂急病治之宜以此半夏二兩湯洗附子半兩炮乾薑五錢良薑二錢半桂枝五錢甘草五錢炙上為細末每服三五錢漿水二盞煎至一盞和滓熱服甚者三四服微者三服大腸經動下痢為鶩溏大腸不能禁固卒然而下成水泄青色其中或有硬物欲起而又下欲了而不了小便多清此寒也宜溫之春夏桂枝湯秋冬白朮湯桂枝湯桂枝白朮芍藥各半兩甘草二錢炙上剉每服半兩水一盞煎至七分去滓取清宜溫服之白朮湯白朮芍藥各三錢乾薑半兩炮甘草二錢炙上剉為粗末如前服之甚則去乾薑加附子三錢辛能發也治厥陰動為瀉痢者寸脈沉而遲手足厥逆下部脈不至咽喉不利或涕唾膿血瀉痢不止者為難治宜升麻湯或小續命湯以發之法云謂表邪縮於內故下痢不止當散表邪於四肢布於絡脈外無其邪則臟腑自安矣諸水積入胃名曰溢飲滑泄渴能飲水水下復瀉而又渴此無藥證當灸大椎諸瀉痢久不止或暴下者皆太陰守病故不可離於芍藥若不受濕不能下痢故須用白朮是以聖人立法若四時下痢於芍藥白朮內春加防風夏加黃芩秋加厚朴冬加桂附然更詳外證寒熱處之如裡急後重須加大黃如身困倦須加白朮如通身自汗逆冷氣息微加桂附以溫之如或後重膿血稠黏雖在盛冬於溫藥內亦加大黃諸下痢之後小便利而腹中虛痛不可忍者此謂陰陽交錯不和之甚也當服神效越桃散大梔子三錢高良薑三錢上和勻每服三錢米飲或酒調下其痛立效治大便後下血腹中不痛謂之濕毒下血宜服黃連湯黃連去須當歸各半兩甘草二錢炙上㕮咀每服五錢水一盞煎至七分食後溫服治大便後下血腹中痛者謂熱毒下血當服芍藥黃連湯芍藥當歸黃連各半兩大黃一錢桂淡味半錢甘草二錢炙上㕮咀每半兩同前煎服如痛甚者調木香檳榔末一錢服之治久病腸風痛癢不任大便下血宜服地榆湯蒼朮去皮四兩地榆二兩上㕮咀每服一兩水一盞煎至七分食前多服除根治濕瀉茯苓湯白朮一兩茯苓去皮七錢半上㕮咀水煎一兩食前服食入而瀉謂胃中有宿谷也當加枳實五錢酒入而瀉濕熱瀉也加黃芩五錢治寒積痢男子小兒婦人皆不問赤白或清痢如水不後重者寒也經云澄徹清冷皆屬於寒皆為虛寒中有積也宜附子巴豆之類下之見痢則愈空心服治瀉痢久不止臟腑虛滑穀不化用蒼朮湯下桃花丸蒼朮二兩防風一兩上剉為細末用水一碗煎至一大盞絞清汁下桃花丸八十丸立愈如小便澀少以五苓散下桃花丸或赤石脂丸小便利則愈矣大陽為協熱痢涼膈散主之陽明為痼瘕進退大承氣湯主之珍珠囊中有少陽風氣自動其脈弦大柴胡湯主之太陰濕勝濡瀉不可利而可溫四逆湯主之少陰蟄封不禁固可澀赤石脂丸乾薑湯主之厥陰風泄以風治風小續命湯消風散主之治下痢膿血裡急後重日夜無度導氣湯芍藥一兩當歸五錢大黃黃芩各二錢半黃連木香各一錢檳榔一錢上為末每服三五錢水一盞煎至七分去滓溫服如未止再服不後重則止雜例溲而便膿血者大腸泄也脈五至之上洪者宜以七宣丸如脈平者立秋至春分宜香連丸春分至立秋宜芍藥柏皮丸四季通用宜加減平胃散七宣丸之類後宜服此藥去其餘邪兼平胃氣芍藥柏皮丸芍藥黃柏各等分上為細末醋糊為丸如桐子大每服五七十丸至二百丸溫水下食前服加減平胃散白朮厚朴陳皮各一兩甘草七錢檳榔三錢木香三錢桃仁黃連人參阿膠各半兩白茯苓去皮半兩上為細末同平胃散煎服血多加桃仁泄加黃連小便澀加茯苓氣不下後重加檳榔木香腹痛加芍藥甘草膿加阿膠濕加白朮脈洪加大黃四時以胃氣為本久下血痢則脾虛損而血不流於四肢入於胃中為血痢宜滋養脾胃則愈夫五泄者之病其治法各不同者外證各異也胃泄者飲食不化色黃承氣湯下脾泄者腹脹滿泄注食即嘔吐逆建中及理中湯大腸泄者食已窘迫大便色白腸鳴切痛乾薑及附子湯小腸泄者溲便膿血少腹痛承氣湯大瘕泄者裡急後重數至圊而不能便足少陰是也莖中痛急利小便此五泄之病也胃小腸大瘕三證皆清涼飲子主之其泄自止後厥陰少陰二證另有治法厥陰證加甘草謂主莖中痛是肝也內經曰肝苦急急食甘以緩之少陰經證多里急後重故加大黃令急推過物去則輕矣內經曰因其重而減之又曰在下者引而竭之又有太陰陽明二經證當進退大承氣湯主之太陰證不能食也當先補而後瀉之乃進藥法也先煎厚朴半兩俱依本方加制水一盞半煎至一半服之若三兩服後未已謂有宿食不消又加枳實二錢同煎服三兩服泄又未已如稍加食尚有熱毒又加大黃三錢推過泄止住藥如泄未止謂腸胃有久塵垢滑黏加芒硝半合宿垢去盡則愈矣陽明證能食是也當先瀉而後補謂退藥法也先用大承氣湯五錢水一盞依前法煎至七分稍熱服如泄未止去芒硝後稍熱退減大黃一半煎兩服如熱氣雖已其人心腹滿又減去大黃枳實厚朴湯又煎三兩服如是腹脹滿退泄亦自愈後服厚朴湯數服則已又寒熱水泄之例於後泄者一也總包五法謂之六義曰六解難經有傷寒五泄叔和云濕多成五泄仲景解四經泄利有不可汗有不可下者可吐可灸者仲景隨經自言之假令渴引飲者是熱在膈上水多入則下膈入胃中胃經本無熱不勝其水名曰水恣故使米穀一時下此證當灸大椎三五壯立已乃瀉督也如用藥乃使車前子擂丸白朮茯苓之類可選用之五苓散亦可又有寒泄者大腹滿而泄又有鶩溏者是寒泄也鶩溏者大便如水中有少結糞者是也如此者當用天麻附子乾薑之類是也又法曰泄有虛實寒熱虛則無力更衣不便已泄出謂不能禁固也實則數至圊而不能便俗云虛坐弩責是也裡急後重皆依前法進退大承氣湯主之一說素問云春傷於風夏生飧泄又云久風為飧泄者乃水穀不化而完出爾非水入胃而成此證非前水恣也此一證不飲水而谷完出名曰飧泄治法於後先以宣風散導之出錢氏方中四味者是也後服蒼朮防風湯蒼朮防風湯蒼朮去皮四兩麻黃去根節四兩防風去蘆頭五錢上為粗末每服一兩生薑七片水二盞煎至一盞去滓溫服泄止後服椒術丸椒術丸蒼朮二兩蜀椒一兩去目炒上為極細末醋糊為丸如桐子大每服二十丸或三十丸食前溫水下一法惡痢久不愈者加桂如小兒病丸如黍米大治瀉痢膿血乃至脫肛地榆芍藥湯蒼朮一兩地榆二兩卷柏三兩芍藥三兩上㕮咀每服一兩水一大盞半煎至一半溫服清病退藥止五泄傷寒乃分三節初說暴次說中後說久泄此說在難經二十二難是三節內包十五法初以暴藥中以的對證藥後疾得中也末治久泄法仲景論厥陰經治法是也治久泄法先進縮煎小續命湯是發其汗使邪氣不能從外侵於內然後治其痢秋冬間下痢風吐論中加減厚朴丸大效凡臟腑之秘不可一例治療有虛秘有實秘胃實而秘者能飲食小便赤當以麻仁丸七宣丸之類主之胃虛而秘者不能飲食小便清利厚朴湯主之厚朴薑製五兩白朮五兩半夏二兩枳實一兩炒陳皮去白二兩甘草三兩炙上為粗末每服三五錢水一盞半生薑五片棗三枚煎至一盞去滓溫服空心實秘者物也虛秘者氣也平胃丸治病久虛弱厭厭不能食而臟腑或秘或溏此胃氣虛弱也常服和中消痰去濕及厚腸胃進飲食厚朴一兩白朮一兩二錢陳皮八錢去白木香一錢生半夏湯洗一兩檳榔二錢半枳實五分甘草三錢炙上為細末薑汁浸蒸餅為丸如桐子大每服三五十丸生薑湯或溫水送下心痛論第二十論曰諸心痛者皆少陰厥氣上衝也有熱厥心痛者身熱足寒痛甚則煩躁而吐額自汗出知為熱也其脈洪大當灸太谿及崑崙謂表裡俱瀉之是謂熱病汗不出引熱下行表汗通身而出者愈也灸畢服金鈴子散痛止服枳朮丸去其餘邪也有大實心中痛者因食受時氣卒然發痛大便或秘久而滯悶心胸高起按之愈痛不能飲食急以煮黃丸利之利後以藁本湯去其餘邪有寒厥心痛者手足逆而通身冷汗出便利溺清或大便利而不渴氣微力弱急以朮附湯溫之寒厥暴痛非久病也朝發暮死當急救之是知久痛無寒而暴痛非熱治熱厥心痛或發或止久不愈者當用金鈴子散金鈴子玄胡各一兩上為細末每服三錢酒調下大實心痛煮黃丸雄黃一兩研巴豆五錢去皮生用研細入雄黃末上再研二味白麵二兩同和再研勻滴水丸如桐子大每服時先煎漿水令沸下藥二十四丸煮一二十沸澇入冷漿水沉冷一時服二丸一日二十四丸加至微利為度用浸藥水送下此治脅下痃癖痛如神治大實心痛大便已利宜藁本湯徹其毒也藁本半兩蒼朮一兩上為粗末每服一兩水二盞煎至一盞溫服清治寒厥暴痛脈微氣弱宜朮附湯附子一兩炮去皮臍細切一兩白朮四兩甘草二兩炙上為粗末入附子令勻每服三錢水一大盞半入生薑五片棗一枚劈破同煎至一盞去滓溫服食前此藥又治風濕相搏身重疼煩不能轉側不嘔不渴大便堅硬小便自利及風虛頭目眩重者不知食味暖肌補中助陽氣止自汗治男子婦人心經中熱搐如癇病狀宜服妙香丸風癇者煎羌活為引下妙香丸血癇當歸湯引下刺心痛諸穴於後真心痛手足青至節痛甚旦發夕死夕發旦死心痛腹脹嗇嗇然大便不利取足太陰心痛引腰脊欲嘔取刺足少陰心痛引小腹滿上下無常處便溺難刺足厥陰心痛短氣刺手太陰心痛當九穴刺之立已不已上下求之得之則已按經三法心痛與背相接善恐如從後觸其心傴僂者腎心痛也先刺京骨崑崙不已刺合谷心痛腹脹胸滿心尤痛者胃心痛也刺大都太白二穴心痛如錐刺乃脾心痛也刺然谷太谿心痛蒼然如死狀終日不得休息乃肝心痛取行間太衝心痛臥若徒居心痛間動作益痛甚者其色不變此肺心痛也刺魚際太淵宣通氣行無所凝滯則病愈也太谿穴足少陰腎經土也為腧在足內踝後跟骨上脈動陷中可灸三壯或五七壯此瀉熱厥心痛崑崙足太陽膀胱經火也在足外踝後跟骨上陷中可灸三壯或五七壯亦可瀉熱厥心痛
